  text: 先求得第一二形腰率比例加減得各形腰率遞併腰率得弦矢率前圖四分起度者界金三分界水十三分界日二十三分界朔三十三分皆通弦弧分界火四分界束九分界南十四分皆倍矢弧分一分起度者界木七分界月十七分界望二十七分皆通弦弧分界子一分界青六分界黃十一分皆倍矢弧分後圖三分起度者界金一分界水十一分界日二十一分界朔三十一分皆通弦弧分界火三分界東八分界南十三分皆倍矢弧分二分起度者界木九分界月十九分界望二十九分皆通弦弧分界土二分界青七分界黃十二分皆倍矢弧分觀圖可悉借率求第一二形腰如前法分母五爲奇應借一分通弦爲二率求第一
