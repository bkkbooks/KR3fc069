body:
  text: 甲乙象限為三分各作通弦又作橢圓相應之通弦復移橢圓辛戍與巳壬移戍戊於庚癸遂成甲酉辛巳與巳亥壬庚與庚乾癸乙三同股之兩勾股形又引巳亥線至申點庚乾線至未點亦分乙丙象限為三分從乙子半分乙丑一分半乙寅二分半各作大半徑從徑端各作餘弦橫截橢圓界從心至橫截處各作抵周線又成心坤午子與心坎辰丑與心離卯寅三同股之兩勾股形此三形與通弦所成者同式何也甲巳司界角對甲震一分弧則巳角必得半分弧度酉甲巳界角對丙巳五分弧則甲角必得二分
