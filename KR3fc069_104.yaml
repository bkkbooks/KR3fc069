body:
  text: 每次不增四除也依是乘除併積可得卽倍分弦矢率無不可得通弦弧分與倍根相當倍矢弧分與根相當通弦率卽兩偶行併根併積倍矢率卽兩奇行併積今再爲弦矢求率更定其法求倍分通弦率法曰以弧分爲二率弧分自乘減一乘二率四除之二三遞除之爲四率弧分自乘減九乘四率四除之四五遞除之爲六率弧分自乘減二十五乘六率四除之六七遞除之爲八率依次遞求凡乘法以一三五七九等數自乘與孤分自乘相減至相減適盡已得末率不必再求二率正四率負以
