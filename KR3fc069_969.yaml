body:
  text: 三十一五為第六數分子以弧分乘全半四乘比例三十二得一百二十八以約定母二百五十六得二以通分子得六十三為定分子四用矢五乘幂相併得以平方併率乘其五層之一邊得三十以三乘併率乘其三層之一邊得二十二五以五乘併率六二五乘其首層之一邊得一二五相併又併七曾得五十七七五為第七數分子以弧分乘全半五乘比例六十四得二百五十六以約定母一千二十四得四以通分子得二百三十一為定分子如是遞求得四分弧逐數定分子如圖例
