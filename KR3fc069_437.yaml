body:
  text: 分其比例之法常等不復另圖居中心角之形數以三五七九等奇數遞加弧分奇或偶而折半則奇其分數亦為三五七九等故分數即形數偶而折半仍偶其分數則為二四六八等故分數加一得形數分母弧如是兩分子相減弧亦如是求第一形腰準是以取形數相應界角之形數以二四六八等偶數遞加分母奇其分子為一二三四等故分子倍之得形數分母偶其分子為一三五七等故分子加一得形數求第二形腰準是以取形數
