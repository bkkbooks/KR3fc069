body:
  text: 甲中前二分用矢為半徑多七十二度正弦乙中後二分為半徑少七十二度正弦乙各再乘相併得乙併各矢立幂得六段三十六度正弦平幂乘半徑六段七十二度正弦平幂乘半徑多五段半徑立幂而兩六段正弦平幂乘半徑即七段五分半徑立幂兩正弦幂併率為一二五以六乘之得七段五分是共得十二段五分半徑立幂也弧分五除之又全半比例八除之得四十分之十二五以二五約之仍得十六分之五大率遞加一分弧則遞加二段五分半徑立幂其分母則遞加八而八分之二五即十
