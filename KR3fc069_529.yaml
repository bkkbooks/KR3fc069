body:
  text: 度即界角相連兩形腰所當和度或較度在遞加數本度即遞加之分母他度即兩根分子和數或較數故通弦分母常與兩等邊三角及遞加數之分母等而分子則為其兩分子之和與較度約度從簡者但知他度為本度幾分之幾便可入算不必定以度數為分子母其不能約者分子母悉從度數也分母自乘與分子自乘相減為第一乘法分母自乘九乘之與分子自乘相減為第二乘法分母自乘二十五乘之與分子自乘相減為第三誠法分母自乘
