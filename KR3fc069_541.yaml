body:
  text: 論曰此求諸率實數也每次置前一數以三率乘之一率除之是已於前率實數中易其本數為後率本數而其用數尚屬前率復依遞加數乘法乘之除法除之始易前率用數為後率用數而得後率實數術列至第四數止如須再求其三率一率乘除及四除每次盡同惟遞加數乘除法漸增而多約言之乘法中乘分母自乘者挨次以各奇數自乘除法挨次以一偶數一奇數遞除也單位視半徑為升降半徑一千萬單位居第八位半徑增多則單位愈降
