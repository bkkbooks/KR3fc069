body:
  text: 一形腰又心庚土形與心界子形同式心辛土形與心金子形即心界甲形同式而心丁庚之與土壬庚心乙辛之與土癸辛亦皆同式以心庚比庚土若心界與界子而心庚與庚土亦若心丁與壬土則心丁與壬土亦必若心界與界子心丁者即整分第五形腰壬土者即整分第二形腰故以之乘除心界心徑得界子一分弧第二形腰以心辛比辛土若心金與金子而心辛與辛土亦若心乙與癸土則心乙與癸土亦必若心金與金子心乙者仍即整分第五形腰癸土者又即整分第八形腰故以之乘除心金半徑得金子即界甲四分弧第二形腰五分之二與三起度者求第一形腰分母五為奇數取整分第五形腰率為除法兩分子相減得一亦奇數取整分第一形腰為乘法乘除半徑得第一形腰求第二形腰仍以求第一形之除法為除法分母奇分子為二者倍得四取整分第四形腰率分子為三者倍得六取整分第
