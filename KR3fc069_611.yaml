body:
  text: 術同弧背求正矢論曰正矢與弧背相當瓜背即其本狐今以弧背求正矢是析弧背至極多分使一分通弦與弧合極多之總分乘之即弧背因以一分弧通弦求總分弧正矢一分為分母總分為分子奕倍分求矢術也以半徑為連比例第一率弧背為第二率二率自乘一率除之為第三率論曰如倍分術宜取一分通弦為二率以求三率
