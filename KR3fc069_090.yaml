body:
  text: 以下皆正負相間凡乘法恒以一二三四等數自乘之與根自乘相減若相減適盡則已得末率不必再求根之左右隔一位隔三位隔五位各兩數相乘本爲遞次乘法而各兩數之和常與倍根等是根其半和也若其較則隔一位兩數相減得二而一爲半較隔三位兩數相減得四而二爲半較隔五位兩數相減得六而三爲半較凡半和自乘內減半較自乘與大小兩數相乘等故以半和根自乘內減半較自乘一四九等數與遞取左右兩數相乘等也心角形求腰較率法曰形數爲倍根倍根自乘減一四除之二除之爲三率倍根自乘減九以乘三率四除之三除之四除之得五率倍根自乘減二十五以乘五率四除之五除之六除之得七率三率爲正五
