body:
  text: 甲乙形心乙丙形心角界角既等乙角又屬錯交角角既錯交自無不等則丙角亦必與甲角等其餘衆形既挨次而列或同用一角或錯交一角準是推之其三角無不相等角等者式必等又心界甲形兩腰心界及心甲皆半徑其腰等則對腰之甲角界角必自相等即衆形之兩腰及對腰角亦各自相等故皆兩等邊三角形而同式既同式其腰底可以遞相比例以心界甲為第一形其腰即半徑底即一分通弦以界甲乙為第二形其腰即一分通弦底即一分倍矢設自界作垂絈至申垂線即正弦申甲即正矢而申點必居底之半以兩腰等故也申甲既為正矢乙甲
