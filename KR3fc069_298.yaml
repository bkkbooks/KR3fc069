body:
  text: 形腰率即第一行數第二形腰率即第二行數推之逐形逐行皆兩兩相應雖正負不盡同而其不同自有定率但如半分遞加數所定易正負法易之自無弗同矣故以遞加數兩耦行相併亦猶界角形兩腰相併可得逐度通弦以遞加數兩奇行去根差相併亦猶心角形兩腰減半徑相併可得逐度倍矢如法求得各弦矢率列後三分弧之二起度各通弦率
