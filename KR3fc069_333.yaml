body:
  text: 其寄分同迺相加得三十五為分子以乘用五率之本率借率分母六乘除之得借五率三十五正分寄六乘七率二百八十負分寄十乘九率五百六十正分寄十四乘而在本率則為五率三十五正分寄十乘為定五率列定三率左如是遞以借率正負相減所餘恒負與求得異名相加為正以乘各用率所寄之分除之得各定率依次列於左方其左上本率即四分之一與三第一形腰也第二形腰率皆耦取半分所得二分通弦率為借率而與本弧通弦二率一相當列右線左借二率二為
