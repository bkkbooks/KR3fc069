body:
  text: 中前一分用矢為半徑多二十二度半正弦甲中後一分為半徑少二十二度半正弦甲各自乘相併得甲中前二分用矢為半徑多六十七度半正弦乙差得二分為半徑少六十七度半正弦乙各自相併得乙兩數相併得兩段二十二度半正弦幂兩段六十七度半正弦幂多四段半徑幂而四段正弦幂相併即兩段半徑幂六十七度半正弦即二十二度半餘弦是共得六段半徑幂也弧分四除之又全半比例四除之得十六分之六以二約之仍得八分之三析象限為五分覔中一分用矢即
