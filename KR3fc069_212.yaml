body:
  text: 立偶數爲倍根卽形數減一倍根加一減一相乘倍根自乘減一其數亦同四除之二除之爲平積卽三率倍根加三減三相乘倍根自乘減九其數亦同以乘平積四除之三除之四除之爲三乘積卽五率倍根加五減五相乘倍根自乘減二十五其數亦同以乘三乘積四除之五除之六除之爲五乘積卽七率倍根加七減七相乘倍根自乘減四十九其數亦同以乘五乘積四除之七除之八除之爲七乘積卽九率如是遞求得各乘積凡定乘法正負及各積正負與偶行同偶行數起根層故整分者用本根半分者用倍根奇行根層無數其根藏兩數閒故整分者左右數
