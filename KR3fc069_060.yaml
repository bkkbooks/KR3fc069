body:
  text: 原數不動應減者皆屬異名相加約其所用無非加法且腰底每遞相生取第一形底加第三形底得第四形腰又加第五形底得第六形腰又加第七形底得第八形腰是界角形腰生於心角形底取第二形底加第四形底得第五形腰較又加第六形底得第七形腰較又加第八形底得第九形腰較是心角形腰又生於界角形底而其加底得腰也乃重疊相加實與遞加數等今就遞加數以明腰底之遞生諸率隨之而衍絶不待安排造作而自然羅列燦陳腰底諸率明弦矢率不煩言而解矣
