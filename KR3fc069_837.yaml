body:
  text: 己與酉率亥庚與亥壬乾乙與乾癸其比例皆同大小半徑坤子與坤午坎丑與坎辰離寅與離卯其比例亦同大小半徑其甲酉巳等平圓通弦所成勾股形旣與心坤子等大半徑所成勾股形同式則甲酉辛等橢圓通弦所成勾股形亦必與心坤午等抵周線所成勾股形同式矣前條大弦求小弦不用不率者可用借率是有甲巳平通弦求甲率橢通弦者可用心子大半徑為借一率以小半徑自乘大半徑除之轉減大半徑名泛三率以乘一分狐乙子之倍倍外矢大半徑除之得借三率之四倍為定三率有巳康求
  hash: sha256:ec97c1504057dcf20b0a502fd5e6acf9f705ffe15d002421744f5895fb83e5b7
