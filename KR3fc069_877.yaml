body:
  text: 得併中前後一分矢幂又併中一分矢三乘幂得二段六十度正弦三乘幂多十二段正弦平幂乘半徑平幂多三段半徑三乘幂而十二段正弦幂乘半徑幂卽九段半徑三乘幂置七分五釐以十二乘之得九故知九段半徑三乘幂二段正弦三乘幂卽一段一分二釐五毫半徑三乘幂七分五釐自乘得五分六釐二毫五絲倍之得一段一分二釐五毫是共得十三段一分二釐五毫半徑三乘幂也弧分三除之全半三乘比例十六除之半矢三乘幂得全矢三乘幂十六分之一得四十八分之十三一二五以八通之三約之得一百二十八分半徑三乘幂
