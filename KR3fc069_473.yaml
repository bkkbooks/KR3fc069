body:
  text: 借弧通弦為二率而非把弧通弦為二率今借弧各率均有相當之本弧各率則可變借率為本率而率於是乎定所謂定率也其法求各奇率除一率為本弧借弧通用無庸變易外視求得率之三率若干以乘用三率之本率借率以乘得之借三率減求得率之三率却盡即與乘得之本三率上下對列為定三率復以借三率之五率減求的率之五率以其減餘乘用五率之本率借率乃以乘得之葉五率減五率減餘卻盡即與乘得之本五率上下對列為定五率復以借三率之七率與借
