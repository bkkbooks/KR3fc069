body:
  text: 圓逐分通弦和求相應之橢圓逐分通弦和先求本數法置小徑平圓逐分通弦和為第一數正次以小半徑為第一率大半徑自乘小半徑除之轉減小半徑為第三率乃置第一數以三率乘之一率除之二自乘除之為第二數正次置第二數以三率乘之一率除之一乘之三乘之四自乘除之為第三數負次置第三數以三率乘之一率除之三乘之五乘之六自乘除之為第四數正次置第四數以三率乘之一率除之五乘之七乘之八自乘除之為第五數負依次遞乘遞除至單位下止第一數正第二數
