body:
  text: 求第一二形腰分母奇求得之率無寄分分母偶求得之率有寄分何則母奇者兩子相減亦必奇分子亦逐分遞加與整分界角形相應故乘除法皆用整分率無寄分即求得之率亦無寄分母偶而折半或奇兩子相減折半則必偶母偶而折半或偶兩子相減折半則必奇常一奇一偶分子亦逐分遞加與半分界角形相應故乘除法兼用半分率有寄分即求得之率亦有寄分易率法先定相當率相當率者借弧通弦為二率其正負若干率適與本弧二率通弦相當也既有當本
