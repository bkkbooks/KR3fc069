body:
  text: 首負根首根以一三增乘一以次根增乘則先減後乘得數亦等故以三減次根以為次負根與首負根首根遞乘而得次位外立積準是推之根層遞取三數相乘二三遞除之可得逐位立積三乘積以下均可類推每增一數乘即增一數除所得者即增一乘之積與整分法悉同特整分求積其積有盡半分求積其積無窮以其有負根因有負數故也今約分六術以覆之求自根斜左一行積立奇數為倍根二除之為根數倍根加二以乘根二除之二除之為平積倍根加四以乘平積而除之三除之為立積倍根加六以乘立積二除之四除之為三乘積倍根加八以乘三乘積二除之五除之為四乘積如是遞求得各成績皆正若用負根遞次乘法易加為減減數大倍根小減得正乘法減數小倍根大減得負乘法視乘法正負與所乘根積同名者得積為正異名者得積為負斜左一行積在整分為三角堆半分者不可以堆名諸根既各帶半分倍之則各得其數故用奇數為倍根根既倍則遞加之二三四等數亦宜倍故易為二四六八而乘法皆倍乘後亦宜各增二
