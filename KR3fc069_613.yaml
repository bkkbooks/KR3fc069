body:
  text: 今用弧背代之是二率為總分乘過數亦即為分子乘過數求得三率必為分子自乘乘過數二除之為第一數寄左論曰本宜以分子自乘乘倍矢為第一數今所用三率即倍矢巳為分子自乘乘過所求迺正矢故須二除次置第一數以三率乘之一率除之得第五率三除之四除之為第二數應減寄右次置第二數以三率乘之一率除之得第七率五除之六除之為第三數應加寄左次置第三數以三率乘之一率除之得第
