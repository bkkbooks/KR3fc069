body:
  text: 差減數得六十萬八千七百十一五五第十四數乘除得六五加一差減數得一百十三萬五千六百三十一五十五數乘除得九十四五加一差減數得四百二十三萬七千六百四十三二五十六數乘除得五百七五加一差減數得七百九十萬六千九百五十八七五十七數乘除得三萬五千九百六十加一差減數得二億三千六百六萬三千九百十五十八數乘除得十三萬九千一百二十八加一差減數得四億四千四十九萬一千八百三以上均與各數定分子合依遞求之例第三差應起六
