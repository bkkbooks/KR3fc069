body:
  text: 通弦與弧合極多之總分乘之即通弧因以一分弧通弦求總分之半弧矢一分為分母總分之半為分子以半徑為連比例第一率通弧為第二率二率自乘一率除之得第三率論曰如倍分術宜取一分通弦為二率今以通弧代之是二率為總分乘過數亦即為倍分子乘過數求得三率必為四倍分子自乘乘過數四除之又二除之為第一數寄左論曰如倍分術宜以分子自乘乘倍矢為第一數
