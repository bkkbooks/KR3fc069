body:
  text: 分子其耦而折半仍耦者分母折而耦分子必折而為奇是即耦分弧弦率之奇分子故耦分弧常於弧分之倍而得其銜率所以然者弦率為通弧之弦而矢率為弧背之正矢而非通弧之矢也若概以通弧弦矢論則通分起度所得為一分通弧弦二分通弧倍矢三分通弧弦四分通弧倍矢弦常得奇分而矢常得耦分半分起度所得為一分通弧倍矢二分通弧弦三分通弧倍矢四分通弧弦矢常得奇分而弦常得耦分是合整半分兩相對待也即零分亦以奇分弧與耦而折半則奇者
