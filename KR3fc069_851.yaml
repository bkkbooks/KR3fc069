body:
  text: 和與逐分半外矢平幂和及立幂和等數不相通非可加乘而得當細核其弧分除各半外矢和與半徑之比例若何及弧分除各半外矢幂和與半徑幂之比例若何並弧分除各半外矢立幂和及諸乘幂和與半徑立幂及諸乘幂之比例若何若得其比例數則即用比例數一乘一除可代末後半外矢及半徑之乘除矣茲分條細核如後凡第二數用半外矢今就象限為一分弧而論析圓周為四分則象限為一分弧則所用為九十度正矢即半徑半之得半外矢為二分半徑之一析象限為二分則中前
