body:
  text: 一率一正三率一負卽半徑減一分倍矢第四行為第四形腰二率二正四率一負第五行為第五形腰一率一正三率三負五率一正以下可推是遞加數又與圓內兩等邊三角形腰率相應也腰率應遞加數何也曰如一率卽第一形腰姿下眾心角形腰其一率亦皆一乘除得底降為二率卽其底內二率亦皆一如根差之數皆為一也二率起於第一形底如上論心角形各底內二率旣皆為一若取第一形以下各底遞加成界角形腰則二率必隨之遞加一加一得二二加一得三三加一
