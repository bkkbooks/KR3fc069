body:
  text: 求得三率亦為一以用三率之本率借率上下對列於定一率左為定三率求得五率亦為一而借三率內之五率反負三之二因通求得率一為三以加之得三之五遂取用五率之本率借率各以分子五乘之分母三除之除則增其寄分上下對列於定三率左為定五率求得七率亦為一而借三率內之七率正九之一借五率內之七率負九之二十相減仍負九之十九通求得率一為九以加之得九之二十八逐取用七率之本率借率各以分子二十八乘之分母九除之上下對列於定五率左為定七率依是核
