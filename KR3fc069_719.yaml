body:
  text: 蕤賓自乘等積開平方得蕤賓求倍蕤賓亦此法此世子所用者細繹之不惟蕤賓可求正黃鐘自乘乘半黃鐘與姑洗再乘等積開立方得姑洗半黃鐘自乘乘正黃鐘與夷則再乘等積開立方得夷則正黃鐘再乘乘半黃鐘與夾鐘三乘等積開三乘方得夾鐘半黃鐘再乘乘正黃鐘與南呂三乘等積開三乘方得南呂正黃纏四乘乘半黃鐘與太簇五乘等積開五乘方得太簇半黃鐘四乘乘正黃鐘與無射五乘等積開五乘方得無射正黃鐘十乘乘半黃鐘與大目十一乘等積開十一乘方得大呂半黃鐘十乘
