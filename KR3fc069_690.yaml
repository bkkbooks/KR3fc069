body:
  text: 率因以一率三率為逐數比例蓋遞閒一率也而立方則閒二率三乘方則閒三率每多一乘則多閒一率約計其數無論一率四率相比一率五率相比要皆與本乘之積比積等故概用借積或本積除其減積為遞次乘法以遞加論平方廉率二乘法起干第三數之一與三由是以三五七九等奇數乘得各數除法起於第二數之二由是以四六八十等偶數除得各數蓋遞加以二也而立方則遞加三三乘方則遞加四推之諸乘廉雖多種而本乘數加一實為諸廉總率故概取廉率二因三因為除法後加減其一
