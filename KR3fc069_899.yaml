body:
  text: 可約者約之使小大要分子分奇數疊乘分母為耦數疊乘但耦數必含奇數母子同含奇數故可約惟二十八十六等數其所含之奇數為單一故不可約既得本數母子乃以本數分母為定母先求一分弧分子一分弧所用外矢即半徑則第二數分子為一半之得二分之一分母與定母同即以一為第二數定分子次以半徑自乘得平幂一則第三數分子為一以分母全半平方比例四約第三數定母八得二以通分子一得二為第三數定分子次以半徑再乘得立幂一則第四數分子亦為一以分母全半
