body:
  text: 負依次遞乘遞除至單位下止第一數正第二數以下耦數正奇數負正負相減得自半分起遞加全分之橢圓各抵周線橢圓內容平圓一象限勻析弧分為幾取遞加奇分弧幾通弦求與平圓相應之逐分橢圓通弦法以一分內容平圓通弦為第一數正取各奇分通弦各爍小半徑除之各減四小半徑為各倍外矢寄左又以小半徑為一率大半徑自乘小半徑除之轉減小半徑為泛三率與左相乘一率除之為定三
