body:
  text: 定分子母而乘除之得各定率其上方橫列者即三分弧之一第一形腰率也前圖第一形腰率皆奇故取奇率為用率今圖第二形腰率皆耦故取耦率為用率第二形有兩祇須求其一今求三分弧之一第二形腰以之減第一形底即三分弧之二第二形腰也至乘除易率之法均與前同不煩多贅惟求用率之指率逐位遞乘而多易於淆混今為約定其乘法乘有兩數列左右兩行間空一位空位作圈以存其率左右兩首位相乘為得數首位左首位乘右三位右首位乘左三位兩數
