body:
  text: 第二數以三率乘之一率除之得第七率第二乘數乘之四除之又五除之六除之為第三數寄左次置第三數以三率乘之一率除之得第九率第三乘數乘之四除之又七除之八除之為第四數寄右第一數與第三數相併第二數與第四數相併左右相減即所求矢單位以下棄之未至單位者依次求之雖未至單位如減數適足四倍弧分自乘數而無乘數者即以前所得數併減之不復遞求如二倍弧則無第三數三倍弧則無第四數論曰此二術乃求倍分弦矢也倍分弧之分母常
