body:
  text: 序向玩弦矢諸率會得遞加數復析圓得兩等邊三角其象適與數會因草成圖解一册聊自達意而疏脫甚多丙午冬謝去紫陽講席筆墨就間漸編定整分半分起度兩種弦矢率而梁楚香中丞復以紫陽大小課藝囑選辭不獲遂又見阻楊緗藝農部在京見舊刻割園捷術序中言及圖解亟思一見丁未冬來杭見訪因示以所煸緗藝謂書未半而君年垂邁是書斷不可不成且不可緩成尅期以一載臨別尚謞切致囑余感其意為之定書名曰象數一原卷一曰
