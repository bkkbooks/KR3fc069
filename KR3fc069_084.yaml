body:
  text: 堆根加三乘立堆四除之得三乘三角堆本宜以根加一乘根根加二再乘二除三除之得立堆而根加一乘根二除之與求平堆同旣得平堆可對去不用故逕以根加二乘平堆也凡乘除法童者可先乘後除亦可先除後乘立堆下仿此依次遞求可得多乘三角堆皆在斜左一線上根在左如諸乘方求廉是法以根爲第一廉視所乘方屬幾乘加一數命爲根根減一乘第一廉二除之得第二廉根減二乘第二廉三除之得第三廉根減三乘第三廉四除之得第四廉依次遞求可得多乘方各廉皆在斜右一線上根在中應分兩種有根當中一數者如界角形求腰率是法以中一數爲根視形數爲第幾折半卽根數卽爲二率根加一減一
