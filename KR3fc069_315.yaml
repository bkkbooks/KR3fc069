body:
  text: 形腰求第二形腰即以求第一形之除法為除法又分母偶分子為一者加一得二取半分起度第二形腰率分子為三者加一得四取半分起度第四形腰率為乘法乘除半徑得第二形腰試圖以明之火土本弧四分為分母界土一分界火三分為分子心甲子即今所求第一形與心火土形同式心子心甲為兩腰界子為一分弧第二形腰界甲為三分弧第二形腰作土已土戊兩線即顯圖中各形與半分起度諸三角相當土己丁當彼第二形心乙丁當彼第三形土戊乙當彼第四形彼之一分今則為二分故借
