body:
  text: 本可開方向立有四術今術本之而微有不同約舉四術中第一術以與今術相參校法借所知積稍大於本積者用為借積內減本積為減積遞次比例以借積為除法減積為乘法本乘方數加一為廉率乃置借積之根為第一數以比例乘除之廉率除之為第二數又比例乘除之廉率減一乘之二因廉率除之為第三數又比例乘除之二因廉率減一乘之三因廉率除之為第四數如是遞次乘除至單位下止併二數後諸數以減第一數得所求根此術每求一數用兩種乘除一用積為比例乘除一用廉率為遞
