body:
  text: 數遞加一得二三四五等是謂整根顯列之數也根起半數遞加一得一數半二數半等是謂零根隱含之數也有零根必有零積在根則閒增一位既以零而補整在積則閒空一位實以整而待雩但如求整積法求得零積整積以偶率對整根奇率對零根零積必以偶率對零根奇率對整根偶率弦也奇率矢也整根一線上偶率整奇率零整偶率可為弦零奇率何不可為矢零根一線上奇率整偶率零整奇率可為矢零偶率何不可為弦且弦矢之偶寄於積弦矢之分定於根併兩整根其分奇一與二併為三二與三併為五皆奇
