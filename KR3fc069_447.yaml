body:
  text: 率數則較少也煦按先生絶筆於此以後今補弧分耦謂折半仍耦者借弧用半分通弦率其四率以下常寄二為分母而位無盡其用為分母之二率常得弧分之半法視分母為二之纍乘數則用二為小分自四率以下按乘數增寄其分但惟分母為二之自乘數則增寄之後其等自齊若較自乘數增幾乘則當以所增乘數自六率以下逐率增乘之並增寄其分其等方齊如分母為再乘數則以二乘六率增寄一乘以四乘八率增寄二乘餘可類推若分母非二之纍積乘則用借弧
