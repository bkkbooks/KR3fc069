body:
  text: 而後遞加分母以生諸分子能生者為分母所生者為分子固不以大小論母子也分子母可約者宜約從小分故分母偶分子不得復偶偶則可約分母由兩數相乘而得者此兩數不得為分子由諸數遞乘而得者此諸數亦不得為分子為分子皆可約也分母一而分子有兩一為正一為負兩分子之和即分母其較即起度通弦弧分此指正大於負者言若負大於正則為負度通弦弧分整分第一形居圓內其形最小半分第一形溢圓外
