body:
  text: 無不得矣圜中諸線之交通固由於通弦倍矢而正弦矢實為八線之宗其用最廣因立術求之術中乘除加減與前二術大略相同所異者正弦術半其本度為分母第一數中弦矢皆增二除求各數省去本數乘除外各增分母自乘之除耳半本度為分母者正矢倍矢同在一度而正弦度則得通弦度之半今定六十為本度欲求他度必須求倍他度通弦折半而後得不倍他度而半本度分子母比例亦同故求正矢卽以六十度為分母求正弦則以三十度為分母也增二除者半徑乃本
