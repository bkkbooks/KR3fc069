body:
  text: 之白下者葢是南坪所藏吾年老嗣孫尚穉久留無所用卽以寄贈項氏此書未見刻本能謀剞劂亦不朽盛業也余受書作函謝之不數月閒先生已歸道山矣噫余在金凌時與先生朝夕聚處及水滬上亦數數相見並不知其藏有是書及至垂邁之年始肯啟篋出之則其鄭重也可知余既心儀項戴之學又感先生臨歿授書之意深恐珍惜秘匿或翻至湮沒也適靜涵表弟有高齋刻之舉遂慫恿付諸手民而仁和高白叔孝廉重其為鄉先輩遺著又舉百金以助閱一歲而書甫刊成
  hash: sha256:0df9c01cb5e12feef7f7b0ba268f7cd776fffac240fc103d0efc6f3d66582006
