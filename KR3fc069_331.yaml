body:
  text: 自乘為本率乘法上下對列相當率左亦即以之為用三率對列於右線右於是本率借率各遞以乘法乘之一率除之得土下相當各用率依次列於右方復以求得第一形腰率列右線右迺求定率視求得一率為一亦以一率一正上下對列左線左為定一率視求得亖率三正分寄再乘逐以分子三乘用三率之本率借率分母再乘除之得借三率三正分寄再乘五率十二負分寄六乘而在本率則為三率三正分寄四乘為定三率對列定一率左視求得五率二十三正分寄六乘而用三率內借五率反負十二
