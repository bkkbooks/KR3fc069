body:
  text: 除正弦得數亦同今不除即以正弦為第一數是為半分母乘過數次以半徑為連比例第一率正弦為第二率二率自乘一率除之得第三率論曰除二率本宜分母除通弦亦可以半分母除正弦今即用正弦是二率為分母之半乘過數求得三率必為分母自乘四之一乘過數次置第一數以三率乘之一率除之得第四率二除之三除之為第二數次置第二數以三率乘之一率除之得第六率九乘之四除之五除之為第三數次
