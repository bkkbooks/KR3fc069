body:
  text: 四除之又四除之五除之為第三數次置第三數以三率乘之一率除之得第八率第三乘數乘之四除之又六除之七除之為第四數以諸數相併卽所求通弦單位以下棄之未至單位者依次求之有矢求幾分通弧之一矢此亦奇耦通用置弧分自乘四倍之減四為第一乘數復置四倍自乘數四乘之減四為第二乘數復置四倍自乘數九乘之減四為第三乘數依次列之乃置矢以弧分自乘除之為第一數次以半徑為連比例第一率弧分自乘除矢又二乘之為第三率以第一數乘之一率
