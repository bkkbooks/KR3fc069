body:
  text: 置弧分自乘遞減一九二十五等為求弦乘法遞減一四九等為求矢乘法而析分則轉以減數乘弧分自乘而又各減一為乘法倍分術通弦為二率倍矢為三率而析分則必需弧分除通弦弧分自乘除倍矢始得二三率倍分術得數分列左右各併之相減為弦矢而析分則逕併諸數為弦矢似其術兩不相通矣由今考之始知求諸數乘除有異者以分子母互為一省乘省除故也得數後加減有異者以分子母互為大小乘法有正負故也凡此皆由分子母而定而分子母實由零分遞
