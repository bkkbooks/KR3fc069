body:
  text: 四率各自乘之比其一率與一二率較之比又必同於三率與三四率較之比今心甲與心乙其比例原同戊丙與戊丁則心甲幂與心乙幂其比例必同於戊丙幂與戊丁幂而心甲幂與心甲心乙兩幂較其比例本必同於戊丙幂與戊丙戊丁兩幂較矣故求二率自乘數者以心甲大半徑自乘幂比心甲大半徑心乙小半徑兩幂較後編大半徑為弦小半徑為股求得勾為兩心差此徑幂較即兩心差幂若戊丙二分倍弧外通弦之一自乘幂與戊丙戊丁兩幂較即二率自乘數也一率大半徑幂二率大小半徑兩幂較三率四分倍弧外通弦幂之一二分之一自乘為四分幂之一
