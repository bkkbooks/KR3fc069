body:
  text: 弧至極多分使一分通弦與弧合乃以極多總分半之取其弧正矢以求一分弧倍矢為三率復求二率通弦總分乘之得通弧則一分為分子總分之半為分母乃析分求矢術也以矢八乘之為第一數論曰所欲求者通弧而假以求者乃一分倍矢又必為四倍分母自乘乘過數而後半徑乘之開方即通弧求一分倍矢本宜以分母自乘除本弧倍矢為第一數今不除以代表即為分母自乘乘過數而尚少四倍應四乘之又所用乃正矢應二乘
