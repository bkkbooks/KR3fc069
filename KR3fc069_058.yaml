body:
  text: 第九十一形腰較相加得火震之倍五分倍矢十一三形腰較相加得木巽之倍六分倍矢十三五形腰較相加得金離之倍七分倍矢十五七形腰較相加得土坤之倍八分倍矢煦案是書原本係先生算草未經點定者故算式尚循俗間所用今悉改從元人細草一豎十橫之例按此弦矢諸率雖多寡錯出要之一遞加數耳弦率由界角形兩腰相加而得矢率由心角形兩腰較相加而得腰底率雖備用乘除加減而乘除祗降一率
