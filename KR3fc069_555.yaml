body:
  text: 所得旣為各實數之半正負併減後所得者必為他度倍矢之半而得他度正矢也總論曰圜中諸線其率互通理數精微實難思議酌定此二術凡勾股割圜六宗三要二簡法與夫杜氏九術董氏四術均於此得其會通焉術中本數之乘除根於連比例諸率用數之乘除根於零整分遞加所以能比例者以同式兩等邊三給相連次列也所以與遞加數合者以弧分遞加諸率亦隨之遞加也不拘拘倍分析分任立一分子母而卽有三角以著其形有遞加以範其數奇偶錯
