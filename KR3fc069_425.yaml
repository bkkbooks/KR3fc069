body:
  text: 錢唐項名達著錢唐戴煦校補零分起度弦矢率論上論兩等邊三角及遞加數衍至五分而止象數之兩相符合巳見一班五分下可以例知不煩再衍矣惟其閒列分求率衍數諸法頗似委曲繁重而覈其條理要自井然今更申論大凡牌得了明於心目五分以下設欲任求者亦可循之推衍云凡分母必大於分子今母大子對者惟首分為然餘皆母小而子大蓋分母為分子所從先生生首分子
