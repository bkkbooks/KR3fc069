body:
  text: 九率七除之八除之為第四數應減寄右第一數第三數相并第二數第四數相并左右相減所餘即正矢論曰遞次求數無四除乃求矢本法以正矢之本弧即弧背也餘與通弧求矢術同通弧求通弧論曰通弧即通弦之本弧以通弦求通弧是析通弧至極多分使一分通弦與弧合則通弧為極多之總分取其通弦以求一分弧通弦總分乘之得通弧一分為分子總分為分母乃析分求弦術也
