body:
  text: 第三乘法分母自乘十六乘之與分子自乘相減為第四乘法凡分母自乘內減分子自乘者為正乘法分子自乘內減分母自乘者為負乘法相減適盡者下更無數不須求故亦無乘法乃置半徑以分子自乘乘之分母自乘除之二除之為第一數次置第一數以第一乘法乘之分母自乘除之三除之四除之為第二數次置第二數以第二乘法乘之分母自乘除之五除之六除之為第三數次置第三數以第三乘法乘之分母自乘除之七除之八除之為第四數第一數常為正第二數下為正乘法所得者前一數
