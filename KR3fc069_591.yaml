body:
  text: 加數而生故明乎零分遞加不惟幾分之幾可以任求且可為析分術推其原兼可為倍分術補其卸而四術之互異者亦於是得其通矣論杜氏九術通弧求通弦論曰設有弧析分至極多所析之分必極細此極細一弧通弦幾與弧合以極多分乘之即原設通弧今以通弧求通弦是以所析極細一分弧通弦而求原設多分弧通弦則一分為分母多分為分子乃倍分求弦術也
