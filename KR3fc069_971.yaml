  text: 本數定分母為首層本數定分子為次層四分弧定分子為三層兩相比較其第八數以上定分子相同無加減差依遞推之例第一差應起倍分加一之第九數而遞加數亦當用第九行除法亦起第九位今第九數本數分子應減一方合定分子而應減數與本數分子之比例若一與六千四百三十五正與遞
