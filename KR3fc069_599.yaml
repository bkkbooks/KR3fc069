body:
  text: 數也第一數第三數相并第二數第四數相并左右相減所餘即通弦論曰三率中所藏分子自乘乃負乘法也乘正數為異名所得者負數乘負數為同名所得者正數故數常正負相間醵奇左負寄右各併之而左右相減是於正數中減去負數始得通弦也相弧求矢論曰矢居通弧之半又以半弧為半弧而通弧得其倍今以通弧求矢是析通弧至極多分使一分
