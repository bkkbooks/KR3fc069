body:
  text: 角之行即可按數而定蓋根起半分則弧分亦宜折半就折半處做半徑線剖全弧為二一端抵圜心以分心角一端底圜界以起界角此半徑即第一形中垂線半徑即為中垂線比以半弧正割為第一形腰正切為其半底亦即第二形腰矣第一二形腰既得乃求各形按首根半分次根一分半三根二分半各自心角作半徑界之是為倍矢弧分首根次根併得二分此根三根併得四分三根四根併得六分各自界角作通弦界之是為通弦弧分於是諸線相交成各三角形弦矢率遂自此出焉繪圖於左
