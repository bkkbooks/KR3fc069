body:
  text: 加數常正弦矢率常一正一負相閒例有一定故正負無煩細辨若半分者遞加根積及弦矢率各有正負多寡異同又復不等不定其例則易於混淆今約定之求弦以偶行根當二率求矢以奇行平積當三率皆常正餘則偶行以積之乘數折半奇行以乘數減一折半視得數偶者仍其正負奇者易其正負至界角形腰正負與弦率同心角形腰正負與矢率反蓋矢率乃心角形腰減半徑之數故也心角形腰率正負以奇行積之乘數加一折半偶則仍之奇則易之有是數必有是形既得此半分遞加圖而兩等邊三
