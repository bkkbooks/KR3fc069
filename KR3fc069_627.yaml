body:
  text: 之得第九率九乘之四除之又七除之八除之為第四數次置第四數以三率乘之一率除之得第十一率十六乘之四除之又九除之十除之為第五數論曰如前論乘法不應減一逕用分母自乘今所用三率巳兼有之但少四乘九乘十六乘等故遞次增乘也以諸數相併又為連比例第三率與第一率半徑相乘開平方得第二率即通弧論曰第一數為四倍分母自乘乘過數遞得諸數莫不皆然併之即為一分倍矢乘分母自乘之四
