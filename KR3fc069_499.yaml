body:
  text: 兩相對待而弦矢率分子以全惟耦分弧則以耦而折半仍耦弧分起度弦矢率母子各折半而得其分子之全此以通弦論弦矢率則然若概以正弦正矢論則整分起度為二分弧之一倍正弦一分弧倍正矢二分弧之三倍正弦二分弧倍正矢矢率得整分之全而弦率轉得半分之全半分起度為二分弧之一倍正矢一分弧倍正弦二分弧之三倍正矢二分弧倍正弦矢率得半分之全而弦率轉得整分之全是整半分兩相交互也即零分亦以奇恩弧與耦而折半則奇者兩相交互而
