body:
  text: 此二法所求諸率逎諸率用數尚非諸率本數本數由本度而生本度者今所知度也半徑為一率本度通弦為二率本度倍矢為三率按連比例可得諸率故每次求率必先三率乘一率除得諸率本數復依是法乘除之得諸率用數而後正負相加減即得倍度弦矢然本是立術弦矢率祇有倍分無析分倍分中弦率亦祇有奇分無偶分此第屬圜中整分起度弦矢率其理猶有遺其數亦未備故其術局而不能賅今必備詳其乘除併減者亦以整分實零分之根整分之術明零分術乃從此可衍也終
