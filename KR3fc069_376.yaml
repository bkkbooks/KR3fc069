body:
  text: 本弧二率通弦相當亦即以三率下正負各奇率與本弧三率倍矢相當第一形腰率皆奇故相當率徑檢前整分起度五分倍矢為三率二十五正五率五十負七率三十五正九率十負十一率一正與本弧三率相當用為相當率又分母大則下位諸率之分子亦愈大不便書寫故分宜省寄相當率各以分母
