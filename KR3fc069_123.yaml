body:
  text: 煦案是圖原合為一但有算式不加外圈與前整分圖互異應加外圈以歸一例既加外圈則幅狹行多不得不分圖為二今以居中第一行領諸正行為左半又重列居中行領諸負行為右半其分母仍寄右半之右若將兩第一行合併為一即成總圖又書中算式今悉從一豎十橫之例凡自一至九作百與萬與百萬同此式自一十至九十作千與十萬與千萬同此式凡為負數則尾位加斜畫以別之
