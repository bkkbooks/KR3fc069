body:
  text: 之例第二差應起四因弧分加一之第十七數遞加數應用三因倍分加一之二十五行而除法仍起第九位今十七數一差減數二億九千二萬一千八百九十五以較定分子應加一而應加數與第一差之比例若一與一千五十一萬八千三百正與二十五行首位一與九位一千五十一萬八千三百之數同乃以二十五行首位與九位乘除十七數第一差為第二差得一以加一差減數得二億九千二萬一千八百九十六與定分子合通計求四分弧加減差其起差數及遞加數所用行數亦與一
