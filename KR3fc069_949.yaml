body:
  text: 六二五相併又併六層得二十三六二五弧分除之得七八七五為分子以全半四乘比例三十二約定母二百五十六得八以通分子七八七五得六十三為定分子三用矢五乘幂相併得以平方率乘其五層得二十二五以三乘率乘其三層得十六八七五以五乘率四二一八七五乘其首層得八四三七五相併又併七層得四十三二一八七五弧分除之得十四四六二五為分子以全半五乘比例六十四約定母一千二十四得十六以通分子十四四六二五得二百三十五為定
