body:
  text: 堆積五第三行根三則平堆積六立堆積十三乘堆積十五第四行根四則平堆積十立堆積二十三乘堆積三十五第五行根五及四乘堆積以下本此可推是皆準底及左右腰三線分層分行而計今按此三線在在聯諸數成等邊三角形若自各形右角作線與左線相奕成直角厯剖三角形為兩心股此剖線之聯諸數也間空一位而間增一行於是前圖心角界角形各腰率遂聯為一線奇偶行亦因此而分第一行為第一形腰一率一正即半徑第二行為第二形腰二率一正即一分通弦第三行為第三形腰
