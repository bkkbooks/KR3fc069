body:
  text: 二分為半徑少六十七度半正弦乙各再乘相併得乙併各矢立幂得六段二十二度半正弦幂乘半徑六段六十七度半正弦幂乘半徑多四段半徑立幂而合兩六段正弦平幂乘半徑即六段半徑立幂以兩正弦幂相併即半徑幂也是共得十段半徑立幂也弧分四除之又全半比例八除之得三十二分之十以二約之仍得十六分之五析象限為五分則中一分用矢即半徑再乘得中前一分用矢為半徑多三十六度正弦甲中後一分為半徑少三十六度正弦甲各再乘相併得
