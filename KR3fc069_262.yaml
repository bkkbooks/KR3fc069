body:
  text: 用三率列於右線右本率列上遞以本三率乘法乘之一率除之得各本率次列其右而其下相當之借率亦遞以借三率乘法乘之一率除之得各借率按率相當而列其下概曰用率用以遞求之率也乃準求得諸率逐次取用借率對率相核增其歉而損其盈乘除之使與求得率等次列於左線左而其上相當之本率亦隨之遞為乘除而次列於上命曰定率即易借率為本所斟定之率也煦案此云借二率寄分宜齊其等差亦有數從簡易無取增乘之過繁而不齊其等者如後五分弧
