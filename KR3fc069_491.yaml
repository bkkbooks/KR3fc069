body:
  text: 數各首積以下正負相間者在腰率正則俱正負則俱負兩相比較亦屬一異一同相次而列是其正負雖與整分異而正負不同之致仍與整分無異也腰較者以心角形腰減一率半徑也半徑為本數而各形腰為減數凡減法無對者易其正負故心角形腰與腰較其正負恆相反然自第三形腰以下小於半徑故以腰率減半徑當易其正負如半分及零分之第一形腰大於半徑是宜以半徑減腰率而三率以下仍其正負矣但雖仍其正負而
