  text: 之共即十二段半徑三乘幂兩種正弦幂相併即半徑幂二段兩種正弦三乘幂之共即一段五分半徑三乘幂二十二度半正弦三自乘六十七段半正弦三自乘相併以半徑三乘幂除之得七五倍之得一五故知為一段五分半徑三乘幂是共十七段五分半徑三乘幂也弧分四除之又全半比例十六除之得六十四分之十七五以二通之仍得一百二十八分之三十五析象限為五分則中一分用矢即半徑三自乘得中前一分用矢為半徑多三十六度正弦甲中後一分為半徑少三十六度正弦甲各三自乘相併得甲甲中前二分用矢為半徑多七
