body:
  text: 六形腰率爲乘法乘除半徑得各第二形腰亦圖以明之火土本弧五分爲分母界土二分界火三分爲分子心甲子卽今所求第一形與心火土形同式心甲心子爲兩腰界子爲二分弧第二形腰界甲爲三分弧第二形腰作土已土金及土癸等線卽顯圖中各形與整分起度諸三角相當土已一分通弦借爲二率土丙丁卽其第四形心丁乙卽其第五形土乙癸卽其第六形廼比例之心丁土形與心界子形同式心乙土形與心金子形卽心界甲形同式以心丁比丁界若心土與心子心丁者卽整分第五形腰心界者卽整分第一形腰故以之乘除心土半徑得心子第一形腰以恿丁比丁土若心界與界子以心乙比乙土若心金與金子心丁心乙皆卽整分第五形腰丁土者卽整入第四形腰乙土者卽整分第六形腰故各以此乘除心界及心金半徑得界子二分弧第二形腰及金子卽界甲三分弧第二形腰比例卽明如法檢前整分起度諸形腰率以求兩種第一形腰及五分之一五分之二第二形腰其三分四分者易率後加減可得無煩遍求求五分之一
