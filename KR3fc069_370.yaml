body:
  text: 六形腰率為乘法乘除半徑得各第二形腰亦圖以明之火土本弧五分為分母界土二分界火三分為分子心甲子即今所求第一形與心火土形同式心甲心子為兩腰界子為二分弧第二形腰界甲為三分弧第二形腰作土已土金及土癸等線即顯圖中各形與整分起度諸三角相當土已一分通弦借為二率土丙丁即其第四形心丁乙即其第五形土乙癸即其第六形乃比例之心丁土形與心界子形同式心乙土形與心金子形即心界甲形同式以心丁比丁界若心土與心子心丁者即整分第五形腰心界者即整分第一形腰故以之乘除心土半徑得心子第一形腰以恿丁比丁土若心界與界子以心乙比乙土若心金與金子心丁心乙皆即整分第五形腰丁土者即整入第四形腰乙土者即整分第六形腰故各以此乘除心界及心金半徑得界子二分弧第二形腰及金子即界甲三分弧第二形腰比例即明如法檢前整分起度諸形腰率以求兩種第一形腰及五分之一五分之二第二形腰其三分四分者易率後加減可得無煩遍求求五分之一
