body:
  text: 論奇耦行首位仍其正負次位易其正負三五七九等位與首位同二四六八等位與次位同此一定之法整分如是半分及零分亦莫不如是弧分奇則奇耦皆可為分子但惟矢率分子得奇耦之全而弦率僅有奇分子而無耦分子必待折弧分為分母之倍而後補其不足弧分耦則分子有奇而無耦但矢率得奇分子而弦率僅有耦分子而無奇分子夫弦率母子俱耦則皆可折自可合分母為弧分之半其耦而折半則奇者分母折而奇分子必折而仍耦適以補奇分弧弦率之耦
