body:
  text: 下皆正負相閒求併積法本宜以並位隔二位隔四位各兩數相乘為乘法今弧分常為兩數和一三五七等數遞為兩數較和方減較方四除之與兩數相乘等故用為乘法也求倍分倍矢率法曰以弧分自乘為三率弧分自乘減一乘三率三除之四除之為五率弧分自乘減四乘五率五除之六除之為七率弧分自乘減九乘七率七除之八除之為九率一次遞求凡乘法以一二三四五等數自乘與弧分自乘相減至相減適盡已得末率不必再求三率正五率負以下皆正負相閒本宜以隔一位隔三位隔五位各兩數相乘為乘法今弧分常為兩數之半和一二三四等數遞為兩數之半較辦和方減半較方與兩數相乘等故用為乘法也
