body:
  text: 分弧同是二分弧遞求加減差之例一一與一分弧脗合矣更驗三分弧及四分弧求三分弧定分子者三分弧用矢一為半徑一為半徑多六十度正弦一半半徑少六十度正弦先求正弦諸乘方與半徑諸乘方比例之率法以六十度正弦自乘半徑幂除之得七五為平方率正弦三自乘半徑三乘幂除之得五六二五為三乘率正弦五自乘半徑五乘幂除之得四二一八七五為五乘率如是遞求得七乘率三一六四六二五九乘率二三七三四六八七五十一乘率一七七九七八五一
