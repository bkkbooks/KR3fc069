body:
  text: 加法適香反也相減適盡者其分母為一分分子為三五七等奇分諸率與整數遞加相應乘法常負分母自三五七等遞加至與分子等減必適盡若分子為偶分不能減盡也乃置本度通弦以分子乘之分母除之為第一數論曰此求二率實數也實數中兼有兩種數一為本數一為用數其與遞加併積等者乃其用數若本數則半徑為一率通弦為二率倍矢為三率用連比例遞求之諸率本數根於本度弦矢用數以求他度弦矢必先定本數後入用數始得他度弦
