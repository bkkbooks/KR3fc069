body:
  text: 庚辛形與甲乙丙丁形線線平行為同式形則戊辛與戊辛除巳庚巳率兩幂較之比必同於甲丁大弦本一率與本三率之比戊庚與戊庚除巳庚巳辛兩幂較之比必同甲丙小弦本一率與本三率之比夫此兩數之比例同於彼兩數之比例則用此兩數一乘一除與用彼兩數一乘一除得數必同故大弦求小弦可用戊辛為借一率戊辛除兩幂較得三率小弦求大弦可用戊庚為借一率戊庚除兩幂較為三率蓋借三率乘又借一率除即如以本三率乘又本一率除也惟第二數則在用本率者徑用本三率
