body:
  text: 率一負減實無對易為正法一率除之得三率一正為得數三率轉乘法三率得三率一負減實無對易為正法一率除之得五率一正為得數五率如是遞乘遞減遞除約除至十五率止每率皆為一正得第一形腰率此式法實心界丁土兩相乘為實之數與首心丁為法是同故得得界子第二形腰數亦等惟下一率耳
