body:
  text: 求得各乘併積凡乘法倍根分子大加減數小則兩數同名乘得正乘法倍根分子小加減數大則兩數異名乘得負乘法若求通弦則乘法正負與併積相反視乘法正負與所乘根積同名者得積為正異名者得積為負求兩奇行併積即備矢率兩奇行閒耦行根分子為根分子即半併根分子即弧分分子自乘之分母自乘除之為併平積即三率根分子一加分母一減分母相乘即弧分分子自乘減分母自乘以乘併平積分母自乘除之三四遞除之為併三乘
