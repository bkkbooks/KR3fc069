body:
  text: 例若九與四百八因檢遞加數第十五行其首位與三位亦為一與一百二十次位十五與四位六百八十之比例亦若九與四百八試以遞加數第十五行自首位起取第九數以下第三差按位挨次乘之又自三位起挨次除之為第四差其第九數乘除得一以加三差減數一百二十七得一百二十八與定分子合第十數乘除得九以加三差減數一百十九得一百二十八亦與定分子合第一十數乘除得九十五以加三差減數一百六十一五得四差加數二百五十六五以較定分子二百五十六尚應減五
