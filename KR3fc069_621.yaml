body:
  text: 數今分母自乘巳極其多增乘後則愈多所減祇一可不必減實則析分至渾與弧合并無分子之一本不應減又今所用三率巳為分母自乘乘過數但少九乘二十五乘四十九乘等故遞次增此一乘也以諸數相并即通弧論曰分母自乘為正乘法乘法正得數皆正故逕併諸數為通弧矢求通弧論曰半通弧為矢之本弧今以矢求通弧是析通
