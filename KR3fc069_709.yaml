body:
  text: 釐七毫九二忽有奇為方之斜即圜之徑亦即賓倍律又以勾九寸乘之得一百十四寸五十五分一十二釐九十八毫五十五有奇為平方實開得一尺七分二毫八六忽有奇即南呂倍律復以勾九寸乘之股九寸再乘之為得八百六十六寸九百三十一分九百八十六釐八百三十毫有奇為立方實開得九寸五分三釐五毫一六忽有奇即應鐘倍律廼以應鐘倍律為一率黃鐘正律為二率應置黃鍾正律二率乘之一率除之得大呂二率乘大呂一率除之得太簇二率乘太簇一率除之得夾
