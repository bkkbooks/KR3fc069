body:
  text: 以下耦數正奇數負次定加減差所起之第幾數亦遞以耦數乘弧分加一為逐次加減差所起之數與原術同原術本數皆負故第一次名加差第二次名減差今術本數正負相間各差皆有加有減故概名為加減差次求逐次加減差其乘除法均與原術同其第一次加減差本數正者負之負者正之第二次加減差本數正者正之負者負之以下奇次差正負均與本數異耦次差均與本數同用表求加減差乘除法亦與原術同末求橢圓逐分通弦和法以正數相併負數亦相併正負相減卽橢圓逐分通弦和
