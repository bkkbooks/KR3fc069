body:
  text: 六十二負為五乘積分寄七乘又帶小分依是遞求每行除根外逐位之積寄分皆遞增三乘各積皆帶寄小分觀圖自悉此四分之三四分之一起根遞加數與前所得各腰率分母雖不等而其數則等如第一形腰之三率分子三寄分母四乘分母為二四次乘之得三十二其相應之遞加數第一行平積分子亦三寄分母自乘又寄小分分母為四自乘得十六又以小分二乘之亦得三十二是所寄實等也餘可類推今將遞加數如前約定之法易其正負取兩耦行遞併以小分二除之根積皆可除盡分母遂易四為二各積消去所寄之小分餘其所寄者以乘數倍之加一為乘數即得逐分通弦率取兩奇行遞併以小分二除之分母仍為四各積消去所寄之小分去根差互易其正負即得逐分倍矢率四分弧之三起度各通弦率
