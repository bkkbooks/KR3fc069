body:
  text: 寄六乘得數三率乘法三率得三率九負分寄五乘乃齊其分轉以分母二乘之得三率十八負分寄六乘各書左併得二十三減右實無對易為正法一率除之得數為五率二十三正分寄六乘依是遞乘凡得數一率乘法率較之餘率乘法率寄分恆多一乘故餘率宜增一分母乘併減右實法一率遞除除至十五率止得第一形腰心界乘丁土則實在兩率之間作圖不便故心丁心界皆降低一率得數
