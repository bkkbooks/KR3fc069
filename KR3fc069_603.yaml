body:
  text: 今所得三率即倍矢惟為分子自乘乘過數而又多四倍故宜四除又所求乃正矢得數後宜折半先半之故復二除也次置第一數以三率乘之一率除之得第五率四除之又三除之四除之為第二數應減寄右次置第二數以三率乘之一率除之得第七率四除之又五除之六除之為第三數應加寄左次置第三數以三率乘之一率除之得第九率四除之又七除之八除之為第四數應減寄右第一數第三數相并第二數第四數相并右相減所餘即矢
