body:
  text: 依次列之迺置弧分乘通弦為第一數寄左次以半徑為連比例第一率通弦為第二率二率自乘一率除之得第三率以第一數乘之一率除之得第四率第一乘數乘之四除之又二除之三除之為第二數寄右次置第二數以三率乘之一率除之得第六率第二乘數乘之四除之又四除之五除之為第三數寄左次置第三數以三率乘之一率除之得第八率第三乘數乘之四除之又六除之七除之為第四數寄右第一數與第三數相併第二數與第四數相併左右相減卽所求通弦單位以下棄之未至單位者
