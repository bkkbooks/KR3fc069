body:
  text: 知本度矢求他度矢法以所知度為分母所求度為分子論曰此求正矢也凡弧矢術所用為通弦正矢故不求倍矢而以正矢相求正矢度卽倍矢度非若正弦度得通弦度之半度旣同求法亦同但就倍矢以明乘除正矢自悉惟數宜折半耳矢之本度卽兩等邊形角度亦卽遞加數分母與通弦同而求他度則為界角形腰所當度及遞加數諸根分子故度分子母常與遞加數分子母等也分母自乘與分子自乘相減為第一乘法分母自乘
