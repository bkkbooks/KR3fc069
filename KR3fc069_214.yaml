body:
  text: 雖整而根各帶半半分者根雖整而左右數各帶半帶半則零故皆用倍根求兩偶行併積卽通弦率立偶數爲倍根卽弧分卽爲併根卽二率倍根加一減一相乘卽弧分自乘減一以乘併根四除之二三遞除之爲併立積卽四率倍根加三減三相乘卽弧分自乘減九以乘併立積四除之四五遞除之爲併四乘積卽六率倍根加五減五相乘卽弧分自乘減二十五以乘併四乘積四除之六七遞除之爲併六乘積卽八率如是遞求得各乘積凡乘法倍根大加減數小則兩數同名乘得正乘法倍根
