body:
  text: 凡四曰求倍分弦矢求析分弦矢審定乘除法以明率數倍分率圓所以通方也析分率方所以通圓也其釋倍分率以方錐堆而方錐堆實出於三角堆弦之二率卽兩堆根相并數四率印兩立積相并數矢之三率卽兩平積相并數五率卽兩三乘積相并數四五率以下多乘積以還莫不如是故遞次乘除皆求堆積法也而卽以之求弦矢弦之分有奇無偶矢之分奇偶俱全至析分率則三角堆無其數卽假倍分之率較量而反釋之可為獨具隻眼矣所疑者堆積旣與率數合何以有倍分無析分倍分中弦率又
  hash: sha256:369864b7882f6d55a7576d551696ec5a28f1f01f8550d9214357be36f61d5b8b
