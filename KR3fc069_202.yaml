body:
  text: 乘數除法即求諸積亦可用遞乘第除法今試寄其除法以便逐位相較而之乘除所得與加減所得其數故無不等求逐位平積依遞加法應以寄除二乘次根加首平積得次未平積而首位平積本即首根乘次根數寄二除下同既同用次根一以二乘一以首根乘則先加後乘得數亦等故以二加首根易為第三根轉乘次根而得次位平積又以寄除乘第三根加次位位平積得三位平積而次位平積本即次根乘第三根數既同用第三根一以二乘一以次根乘則先加後乘得數亦等故以二加次根易為第四根轉乘第三根而得三位平積依遞減法應以寄除二乘首根減首位平積得首位外平積而首位平積本即次根乘首根數既同用首根一以二乘一以次根乘則先減後乘得數亦等故以二減次根易為首負根轉乘首根而得首位外平積負又以寄除二乘首負根減首位外平積得次位外平積而首位外平積本即首根乘首負根數既同用首負根一以二乘一以首根乘則先減後乘得數亦等故以二減首根得次負跟轉乘次負根得次位外平積正準是推之根層遞取兩數相
