body:
  text: 角形腰得次後界角形腰乘除而得底凡應減者恆異名應加者恆同名故皆用加法乘除恆遞降一率如法列式於左煦按注云說詳乘除說詳加減而說未有顧其義己散見書中茲不復補遞求整分起度各形腰底率第一形腰心界半徑一第二形底腰界甲通弦第二形底甲乙倍矢第一二形腰底相減得第三形腰心乙第三一形腰二率除乘之得底乙丙第二三形腰底相加得第四形腰界丙
