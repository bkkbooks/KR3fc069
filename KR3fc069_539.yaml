body:
  text: 所以然者因每次求率除法中應有一分母自乘三率旣為除過數以乘前率而求後率便可省去分母自乘除也置第一數以三率乘之一率除之得第四率第一乘法乘之四除之又二除之三除之為第二是次置第二數以三率乘之一率除之得第六率第二乘法乘之四除之又四除之五除之為第三數次置第三數三率乘之一率除之得第八率第三乘法乘之四除之又六除之七除之為第四數依是遞次乘除得各數漸小至單位止
