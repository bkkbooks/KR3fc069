body:
  text: 正者正之負者負之為負乘法所得者前一數正者負之負者正之但有正數併正數卽所求正矢兼有負數併正數與併負數相減卽所求正矢論曰弦矢術每求一數有兩種乘除其除法常不易乘法則隨本度他度而定依本度得三率而定本數乘法以本度校他度得分子母而定用數乘法二者固不能省也顧念六十度通弦正矢卽半徑若用為本度則一率半徑與二率通弦三率倍矢皆等可以省本數乘除但校定分子母依遞加數乘除之祇一半徑而一象限逐度分秒之弦矢
