body:
  text: 就相當率核定其等差遮加減乘除不至於紊今分條論之分母奇母耦而折半則奇者亦同一例借弧用整分通弦率率皆實數其位有盡法視分母為他數自乘而得或再乘而得者則用他數為小分煦案母偶而折半則奇者不可用小分以除借四率若他數再乘得者以他數自乘除之皆可除得整數仍寄小分於右六率仍其原數若他數再乘得者以他數除之寄小分自乘於右八率轉以小分乘之若他數再乘得者仍其原數寄小分再乘於右下仿此若分母為兩數相乘而得或諸數連乘而得者其小分雜糅用之不便四率仍其原數寄分母於右六
