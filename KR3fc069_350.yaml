body:
  text: 如前圖首根三正右寄分母以首根減分母得一負乘首根得三負分母除之二除之均不受除即以為首行平積寄分增為自乘又寄小分二以後遞增分母乘數而仍帶此小分至得次行四乘積為七十七正分寄五乘又帶小分更求首行五乘積宜以首根減三分母得九負乘四乘積得六百九十三負分母除之六除之分母不受除六則但可三除而寄其二除二百三十一負寄分應增一乘小分之二合前所帶者可進為一乘總計之分寄七乘較之每行逐位遞增之乘數尚少寄一小分故轉以二乘之得四百
