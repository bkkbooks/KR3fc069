body:
  text: 數遞乘遞除相併減即諸律可得其數與開方所得者吻合以擬古法蓋皆自黃鐘左旋下生而不拘於隔八其生林鐘所損者不及三分之一此實由律數位數自然而生絶不待安排造作者次列於後亦聊備律家術算之一助云爾鄭世子勾股開方算律法世子以方尺即黃鐘有十寸之尺對九寸之尺今用九寸為黃鐘以便與古律相校法曰內方東西九寸為勾南北九寸為股各自乘得八十九寸相併得一百六十二寸為弦竇平方開之得一尺二寸七分二
