body:
  text: 一率大半徑二率小半徑自乘大半徑除之轉減大半徑三率四分倍弧倍外矢之一四率求抵周線三率此用四分倍外矢之一故求得四率卽求抵周線之三率若徑用倍外矢為三率則所得必為求抵周線三率之四倍卽術中所謂定三率故每數增四除也凡橢圓內容平圓自大徑所指起於若干度作半徑又作本度餘弦復引長直截橢圓界從圓心至直截處作橢圓抵周線成同勾之兩句股形小半徑為小
