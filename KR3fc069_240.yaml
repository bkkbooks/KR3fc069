body:
  text: 第一形腰較甲火與第三形腰較乙火相減餘辛火之倍卽三分弧之二倍矢第三形腰較丙東與第五形腰較丁東相加得壬東之倍卽三分弧之五倍矢依是遞加得倍癸南卽三分弧之八倍矢若以界子丑為第二形則界甲乙為負形以負形腰界甲減第一形底甲子餘界子為第二形腰二率乘一率除得底子丑以減第一形腰心子餘心丑為第三形腰二率乘一率除得底丑寅以加第二形腰界丑得界寅為第四形腰二率乘一率除得底寅卯加是遞為加減乘除至第七心午未形可得各腰底廼以第二形
