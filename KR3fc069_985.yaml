body:
  text: 法以小半徑為第一數正取各奇分通弦各自乘小半徑除之各減四小半徑為各倍外矢通弦自乘半徑除之為倍正矢四半徑即二全徑故減倍正矢得倍外矢寄左又以小半徑為一率大半徑自乘小半徑除之轉減小半徑為泛三率為左相乘一率除之為定三率二除之又四除之為第二數正次置第二數各以三率乘之一率除之得五率一乘之四除之又四除之為第三數負次置第三數各以三率乘之一率除之得七率三乘之六除之又四除之為第四數正次置第四數各以三率乘之一率除之得九率五乘之八除之又四除之為第五數
