body:
  text: 腰心甲餘心乙為第三形腰二率乘之率除之得乙丙底以加第二形腰界乙得界丙為第四形腰二率乘之率除之得丙丁底以減第三形腰心丙得心丁為第五形腰二率乘之率除之得丁戊底以加第四形腰界丁得界戊為第六形腰如是遞相加減得各形腰底乃以第二形腰界乙第四形腰乾乙即界丙相併得界乾為二分弧通弦以第四形腰界丁第六形腰坎丁即界相併得界坎為四分弧通弦以第一形腰較甲午第三形腰較乙午相減不用併而用減者以第一形腰大於半徑其腰較乃半徑反減而德與各腰較正負異名同名者宜加異名者必宜減也得白午之倍為半分弧倍矢白乙白甲皆半底白甲半底內減甲午腰較即白午正矢而乙午腰較兼有白乙半底白午正矢若減甲午腰較必得白午正矢之倍也以第三形腰較丙金第五形腰較丁金相併得青金之倍為一分半弧倍矢如是遞併得各偶分通弦及各帶半分之倍矢是比例加減與整分法悉同也惟第一形腰非半徑而用半弧正割第二形腰非通弦而用半弧正切今以一率半徑二率通弦求之必用諸率乘除加減開方之法始可得其率數算術列後先以通弦求餘弦本弧通弦求半弧餘弦應用勾股開方法半徑為一
