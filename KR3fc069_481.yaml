body:
  text: 一位乘本位本層遞加數除之本層遞加數如平積用二除立積用三除三乘積用四除之類是也得左下一位積以向上斜右線所聯根層之右一位乘本位本層遞加數除之得右下一位積此通法也而零分遞加數逐層皆有寄分須兼用通分法其根層恒寄分母故以斜左線所聯根層之左位乘本位遞加數除之又以分母除之而始得左下位積以斜右線所聯根層之右位乘本位遞加數除之又以分母除之而始得右下位積又以左上一位根積家本位得左位積以右上一位減本位得右位積亦通法也而在零分
