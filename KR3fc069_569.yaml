body:
  text: 度通弦倍矢求諸數減併後折半方得他度正弦矢今第一數先以二除一數半則諸數皆半後不煩折也增分母自乘除者遞加數本法每降一率必分母除之降兩率必分母自乘除之前二術無此除者因所用三率業經除過今既不用三率則不能省此除也論董氏四術有通弦求加幾倍弧分之通弦凡弦之倍分皆取奇分下同置弧分自乘減一為第一乘數復置弧分自乘減九為第二乘數復置弧分自乘減二十五為第三乘數
