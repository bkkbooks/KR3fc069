body:
  text: 五率之七率相併減求得率之七率以其減餘乘用七率之本率借率乃以乘得之借七率減七率減餘卻盡即與乘得之本七率上下對列為定七率如是遞乘遞併遞減至求得各率減盡而止而連定率之諸本率即所求腰率也求耦率其法並同弧分奇求得率無寄分與借率相減時須通分視借率分母或用小分或用弧分而其等已齊者其借率同位自然同母相併不必通分惟須以借率分母通求得率然後相減若借率分母之等不齊
