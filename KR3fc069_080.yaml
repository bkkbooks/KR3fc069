body:
  text: 此圖根一層平列於上每行直下積即腰率及腰較率腰起二率以下率皆偶腰較起三率以下率皆奇遞併相並兩行之偶率即倍分弦率遞併相並兩行之奇率即倍分矢率欲求率數須明遞加數以根求積法有斜行積有直行積有兩直行併積宜分別求之論遞加數以根求積法遞加數各積由諸根遞加而得故求積之乘除法皆用根一層數遞以根層相連兩數相乘二除之得平積一層數遞以相連三數相乘二除三除之得立積
