body:
  text: 法四率得三率二負以減實餘三率一減數大易為正法二率除之得四率一正為得數四率轉乘法四率得四率一負以減實無對易為正二率除之得六率一正為得數六率如是遞除至十六率止以上所得第一二形腰率皆借一分通弦為二率非本弧三分通弦為二率也須用易率法易借率為本率而後乘除加減可以施易率法左右作二直線向上作一橫線列於橫線上者日本率以本弧通弦為二率者也列於橫線下者曰借率
