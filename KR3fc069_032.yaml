body:
  text: 無事開方而算術之繁者簡矣是知失其原則紆回難入得其原則徑捷易從方圓象數所由來誠不可不表章而推衍之也圓分貴乎勻析分之整所不待言今別而出之首標整分者因更有零分率在而此整分實為其先導也零分不易佑整分可知其三角形不待尋求但逐分作半徑而於奇分作通弦各形已了然可見矣遞加數亦不造作但本一而遞次加之諸數己燦然畢呈蓋象數之用雖極於變不勝窮而其常焉者則又明示其端而未嘗隱也
  hash: sha256:e401f2ea14bb3817c5884223a79cb8f240550dee850ad47006e30e9a028dcf04
