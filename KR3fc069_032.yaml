body:
  text: 無事開方而算術之繁者簡矣是知失其原則紆迴難入得其原則徑捷易從方圓象數所由來誠不可不表章而推衍之也圓分貴乎勻析分之整所不待言今別而出之首標整分者因更有零分率在而此整分實為其先導也零分不易佑整分可知其三角形不待尋求但逐分作半徑而於奇分作通弦各形已了然可見矣遞加數亦不造作但本一而遞次加之諸數己燦然畢呈葢象數之用雖極於變不勝窮而其常焉者則又明示其端而未嘗隱也
  hash: sha256:42a3acdf622577d9179620d4b87f62e4a3b4620530d98c3e5dae797f7b970943
