body:
  text: 錢唐項名達著諸滿諭明變錢唐戴煦校補象百變即數亦百變全體達用故無一非變全用在體故無變非一非體一而用變也前所論象為弦矢正不惟弦矢而巳一度中八綫皆是象豈遂不與數會者又不惟八錢而巳盈兩閒耳聞目見身觸意知者皆是象豈遂不與數會者今將舊所定弦矢求八錢術開諸乘方捷術算律管新術列於卷中是皆從遞加數轉變而得末乃列橢圓徑求周術因其淵奧
