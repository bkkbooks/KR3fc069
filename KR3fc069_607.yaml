body:
  text: 弦術也以弧背為第一數寄左論曰如倍分術宜以分子乘一分通弦為第一數若求正弦宜折半今弧背本即半分子乘一分通弦故即為第一數次以半徑為連比例第一率弧背為第二率二率自乘一率除之得第三率論曰本宜取一分通弦為二率以求三率今用弧背代之是二率為總分乘過數亦即為半分子乘過數求得三率必為分子自乘四之一乘過數
