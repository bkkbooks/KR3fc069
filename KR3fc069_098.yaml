body:
  text: 為併立積倍根加一減一為兩數之倍相乘後增為四倍故宜增四除求併四乘積宜取六數併左右位兩數為實中閒並位兩數相乘隔二位兩數相乘遞乘之二三四五遞除之而左右數併仍與倍根等並位兩數相乘乘併根二三遞除與求併立積同既得併立積可對去不用隔二位兩數又即倍根加三減三折半之數故以倍根加三減三相乘以乘併立積四除之四除之五除之為併四乘積以此遞推無論左右隔幾位兩數併之皆與倍根等是倍根為和其較則以一三五七等數遞加而多和較相加減常得各兩數之倍故相乘以乘前
