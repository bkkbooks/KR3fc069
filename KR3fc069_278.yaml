body:
  text: 數兩數一寄分一不寄分乘後仍寄原分兩數皆寄分者乘後以兩分相乘為寄分今借三率遞乘用率各率皆正負相間乘數同位者恒同名故概用併得數亦皆正負相間寄分先須齊其等差乘後同位者亦恒同分得數首位不寄分次位寄分母三位寄分自乘以次遞增得數之位相連故率亦相連若以一率除之則仍閒空一位而奇率歸奇率耦率歸耦率也旣得第一二形腰率可以比例加減求各形腰底今將三分之二起度者列於前三分之一起度者列於
