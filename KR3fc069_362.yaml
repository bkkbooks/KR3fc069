body:
  text: 其以兩分子如爲分子者則分母爲較以兩分子較爲分子者則分母爲和分母若奇兩分子必一奇一耦而和較常奇奇則不能折半而約使小故通弦分母卽遞如數之分母分母若耦其分子耦則俱耦奇則俱奇俱耦者子母皆可折毋須立此遞如數俱奇者遞加數不能折而兩分子之和較則常耦耦卽可折故通弦分母得遞加數分母之半其分子爲兩分子之半較半如也準是論之前三之一起度者通弦消去分母而成整分分子各折半今四之一與三起度者通弦分母折爲二分子亦折半可悉所由來矣兩圖皆以火土爲本弧各析爲五分前圖界火五分之四界土五分之一後界火五分之三界土五分之二各由此按度作線卽成同式兩等邊各三角形
