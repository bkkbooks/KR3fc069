body:
  text: 其以兩分子如為分子者則分母為較以兩分子較為分子者則分母為和分母若奇兩分子必一奇一耦而和較常奇奇則不能折半而約使小故通弦分母即遞如數之分母分母若耦其分子耦則俱耦奇則俱奇俱耦者子母皆可折毋須立此遞如數俱奇者遞加數不能折而兩分子之和較則常耦耦即可折故通弦分母得遞加數分母之半其分子為兩分子之半較半如也準是論之前三之一起度者通弦消去分母而成整分分子各折半今四之一與三起度者通弦分母折為二分子亦折半可悉所由來矣兩圖皆以火土為本弧各析為五分前圖界火五分之四界土五分之一後界火五分之三界土五分之二各由此按度作線即成同式兩等邊各三角形
