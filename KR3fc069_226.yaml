body:
  text: 錢塘項名達著零分起度弦矢率論數有零乃不窮於用前因整分遞加推及半分而弦率始備於是倍分諸率皆確然有數可稽矣顧於弦分得整於矢分則得零是補整分之欠者此半分而開零分之先者亦此半分也半分爲二之一二爲分母旣得其一分矢率卽任設一數爲分母亦可得其一分矢率矢率然弦率何不然於是析分諸率又確然有數可稽矣且一分率特起度之分子耳分子起
