body:
  text: 右位平積中位數乘左位數二除之得左位平積乃併之為併平積既同以中位數為乘法又同二除則先併後乘除與先乘除而後併一也遞取相連四位數以最左右位兩數相併中間並位兩數相乘以乘之二除之三除之為併立積如前法宜以中間並位兩數相乘以乘右位數二三遞除之得右位立積中間並位兩數相乘以乘左位數二三遞除之得左位立積乃併之為併立積既同以並位兩數相乘為乘法又同用二三除則先併後乘除與先乘除而後併一也下仿此遞取相連五位數以最左右位兩數相併中位一數乘之隔一位兩數相乘再乘之二除之三除之四除之為併三乘積遞取相連六位數以最左右位兩數相併中間並位兩數相乘以乘之隔二位兩數相乘再乘之二除之三除之
