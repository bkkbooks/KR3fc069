body:
  text: 衍之則有多一命曰根差第二行亦起一遞加首行根差之一成二三四五等數命曰根第三行亦起一遞加第二行之二三四五成三六十十五等數命曰平積第四行亦起一遞加第三行之三六十十五成四十二十三十五等數命日立積推之三乘積乃至多乘積均依是遞加可至無盡左右諸數復兩兩相當而等由是左線所聯者根歸根積歸積右線所聯者則為同根之各積此遞加本法也是圖祗一遞加法極整齊平易而包蘊正自無窮且略言之如八卦原於一畫首層為太極祗一次層為
