body:
  text: 積每次宜增四除也兩奇行根層無數兩行間之偶行反有數故即用偶行根數為根求併平積宜取三數併左右位兩數為實中位一數乘之二除之而中數即根左右數併又與倍根等故徑以根自乘為併平積根自乘與根乘倍根二除之等求併三乘積宜取五數併左右位兩數為實中位一數乘之隔一位兩數相乘再乘之二三四遞除之而左右數併仍與倍根等中數乘倍根二除之與求併平積同既得併平積可對去不用隔一位兩數又即根加一減一之數隔一位兩數半較為一半和即根故以根加一減一相乘以乘併平積三除之四
