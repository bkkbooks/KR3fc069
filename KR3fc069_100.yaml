body:
  text: 積每次宜增四除也兩奇行根層無數兩行閒之偶行反有數故卽用偶行根數爲根求併平積宜取三數併左右位兩數爲實中位一數乘之二除之而中數卽根左右數併又與倍根等故逕以根自乘爲併平積根自乘與根乘倍根二除之等求併三乘積宜取五數併左右位兩數爲實中位一數乘之隔一位兩數相乘再乘之二三四遞除之而左右數併仍與倍根等中數乘倍根二除之與求併平積同旣得併平積可對去不用隔一位兩數又卽根加一減一之數隔一位兩數半較爲一半和卽根故以根加一減一相乘以乘併平積三除之四
