body:
  text: 弦及兩半徑所作三角形同式可相比例是為第一形取三分弧之二起度自心作心束心南乃至心中諸半徑使東火南東中北等皆如火土本孤又自界作界水界日界朔諸通弦使水金日水朔日等皆得火土本弧之倍或取三分弧之一起度自心作心青心黃乃至心白諸半徑使青土黃青白黑等皆如火土本弧又自界作界木界月界望諸通弦使木金月木望月等皆得火土本弧之倍諸線相交成各兩等邊三角而皆同式可以比例先用法求得第一形腰心子二率乘一率除得底甲子若以界甲乙為第二
