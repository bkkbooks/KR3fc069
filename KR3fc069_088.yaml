body:
  text: 五率四除之五除之六除之得七率根數零加減數亦必零本宜以根加減半數得左右並位兩數加減一數半得隔二位兩數加減二數半得隔四位兩數今根用倍加減數亦宜倍故倍其半為一倍其一數半為三倍其三數半為五以之加減倍根必得各兩數之倍相乘後增為四倍乘法既增四倍除法亦宜增四除也依次遞求可得各腰較率而皆在直下一線上遞加數以根求積大要不越此數種今再為兩等邊三角求率更定其法界角形求腰率法曰形數折半為根即為二率根自乘臧一以乘二率二除之三除之得四率根自乘減四以乘四率四除之五除之得六率根自乘減九以乘六率六除之七除之得八率二率為正四率為負
