body:
  text: 六百十五得四千六百十六第十數乘除得九以加一差減數七千八百七十一得七千八百八十十一數乘除得九十五加一差減數二萬六千八百九得二萬六千九百四十二數乘除得三百八十五加一差減數四萬五千五百四十三得四萬五千九百二十八均與各數定分子合十三數乘除得五千三百十三加一差減數得二差加數三十一萬三千六百十六五以較定分子當應減五是二分弧第三差起第十三數也而應減數與第二差之比例若五與五千三百十三十四數乘除得一萬六千四百四
