body:
  text: 者可用坤心小半徑為一率以泛三率乘五分弧戊坤之倍倍外矢小半徑除之為定三率矣以上二圖止析為三分以起例雖析至多分其用亦同求一分通弦用定三率而逐分橢弦不齊即所用定三率亦不齊若以平圓通弦和求橢圓通弦和則定三率極繁不便於用當分析之以究其不齊之故然後可齊不齊以致其齊蓋定三率者固即泛三率乘奇分倍外矢半徑除之之數也是定三率乘之即如以泛三率乘之又倍外矢乘之半徑除之矣若不用定三率而用泛三率則必加一倍外矢之乘半徑之
