body:
  text: 除也又二四六八等遞加數恆為正正根與之同名故用加負根與之異名故以減為加求自根斜右一行積立奇數為倍根二除之為根數倍根減二以乘根二除之二除之為平積倍根減四以乘平積二除之三除之為立積倍根減六以乘立積二除之四除之為三乘積倍根減八以乘三乘積二除之五除之為四乘積如是遞求得各成積凡乘法減數小倍根大減得正乘法減數大倍根小減得負乘法視乘法正負與所乘根積同名者得積為正異名者得積為負若用負根遞次乘法易減為加皆負定積正負法與上同斜右一行積在整分為廉率半分者不可以廉名積既斜右乘法宜遞取根右數故用減減數自小而大愈大則反減故乘法先正後負若負根與減數異名故以加為減而乘法常負求偶行直下即界角形腰率立奇數為倍根即形數減一二除之為根數即二率倍根加二減二相乘倍根自乘減四其數亦同以乘根四除之二除之三除之為立積即四率倍根加四減四相乘倍根自乘減同以乘立積四除之四除之五除之為四成積即六率
