body:
  text: 一借大積與前第一術相合一借小積其得數則正負相閒余既喜第一術之得所印證又思此正負相閒者較前第二術雖降位稍遲而在數中其術實所應備何則第一術借大積則本積為小積故以借積比減積第二術借小積則本積為大積故以本積比減積是比例皆用大積也夫大積可比例豈小積獨不可比例今此正負相閒術借小積即以小積比減積以是推之當更有借大積仍以小積比減積而與為對待者因積衍一術復以質鄂士而鄂士復有見於此出其稿若合符節焉
