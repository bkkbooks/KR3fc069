body:
  text: 四除之五除之為併四乘積下至多乘併積可以類推然今所求者為兩直行併積宜定根求之併積雖似無根而實有根在根居兩行閒須辨行之奇偶偶率兩行為偶行奇率兩行為奇行兩偶行根層有數兩行閒之奇行反無數故即併偶行兩根數為倍根亦即為併根求併立積宜取四數併左右位兩數為實中閒並位兩數相乘以乘之二三遞除之而左右數併仍與倍根等並位兩數又即倍根加一減一折半之數並位兩數其較一其和即倍根和較相加減各折半即得兩數故以倍根加一減一相乘以乘併根即倍根四除之二除之三除之
