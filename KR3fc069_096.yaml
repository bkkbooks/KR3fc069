body:
  text: 四除之五除之爲併四乘積下至多乘併積可以類推然今所求者爲兩直行併積宜定根求之併積雖似無根而實有根在根居兩行閒須辨行之奇偶偶率兩行爲偶行奇率兩行爲奇行兩偶行根層有數兩行閒之奇行反無數故卽併偶行兩根數爲倍根亦卽爲併根求併立積宜取四數併左右位兩數爲實中閒並位兩數相乘以乘之二三遞除之而左右數併仍與倍根等並位兩數又卽倍根加一減一折半之數並位兩數其較一其和卽倍根和較相加減各折半卽得兩數故以倍根加一減一相乘以乘併根卽倍根四除之二除之三除之
