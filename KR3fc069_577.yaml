body:
  text: 為一其分子即所倍弧分惟分母為一凡前所定二本術中應用分母乘除者可省去不用乘法中本應置分五自乘數求弦則一乘九乘二十五乘求矢則一乘四乘九乘為減數今皆省共乘徑以一九二十五及一四九等為減數一四九等四倍之即為四十六三十六是其減數增四倍乘法亦增四倍也又求第一數求三率本術皆有分母除亦省去既不用分母故亦不用分子但名弧分乘法中弧恩自乘求第一數弧分乘通弦弧分自乘乘矢即本術分子也其乘除加減均不外乎前所定二本術按之自悉惟求弦皆取奇分此第以整分起度故耳其實半分起度即可得耦分通弦率宜補之方備求矢乘數增為四倍故遞次求數亦增四除是因通弦
