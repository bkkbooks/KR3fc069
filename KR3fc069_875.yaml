body:
  text: 六分之五故逐分遞加常得十六分半徑立幂之五是就本數而論則五乘十六除可代用矢立幂及半徑立幂之乘除就前一數加乘加除求本數則前數已含三乘八除是五乘十六除三與五遞乘六與八遞除即五乘十六除可代弧分除半外矢立幂之乘半徑立幂之除也惟一分弧用矢立幂為十六分之二當有加減差第五數用倍外矢三乘幂析弧分為三分則中一分用矢即半徑三自乘得中前一分用矢為半徑多十六度正弦三自乘得中後一分即半徑少六十度正弦三自乘
