body:
  text: 以借弧通弦為二率者也本二率一當借率若干曰相當率上下對列於右線左取相當之借二率數為分母除相當率得本二率一旁寄分母借二率除得一其下各率皆寄分分宜齊其等差如四率則旁寄分母六率轉以分母乘之旁寄分自乘八率轉以分母自乘乘之旁寄分再乘為用二率各自乘之半徑一率除之得本三率一旁寄分自乘借三率仍為一其下各率增多寄分亦按率增多為用三率用二率用三率同指本率言借率亦從之下雖尚有各率而其首位用二率則自二率起用三率則自三率起亦即乘法上下對列於相當率左復以借率所求得之率列於左線右視求得率為耦取用二率為奇取
