body:
  text: 蓋鄂士推闡四元於四廉正負之理深入三昧故觸而即通如此爰取鄂士稿補列於後命曰補第一術補第二術得此而術乃大備廉以志兩人心得之同云爾按此四術者煦皆與有力然皆先生之發其緘也
