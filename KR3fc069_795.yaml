body:
  text: 其一二辛同者以兩原三率之較為三率覔四率必為兩原四率之較今若以大小半徑為一二率則子丙為三率者子巳為四率戊丁為三率者戊庚為四率亥戊為三率者亥壬為四率而申丁為子丙戊丁兩三率之較丑庚為子巳戊庚兩四率較故比例同大小半徑酉戊為戍丁亥戊兩三率較寅壬為戍庚亥壬兩四率較故比例亦同大小半徑又凡四率比例仍其原一二率而以原一率與三率之較為三率則四率必為原二率與四率之較今未乙為三率亥戊與一率大半徑心乙之較卯癸為四率亥壬與二
