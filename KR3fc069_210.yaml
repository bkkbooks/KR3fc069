body:
  text: 倍根加六減六相乘倍根自乘減三十六其數亦同以乘四乘積四除之六除之七除之爲六乘積卽八率如是遞求得各乘積凡乘法倍根大加減數小則兩數同名乘得正乘法倍根小加減數大則兩數異名乘得負乘法又倍根自乘內減減數者爲正乘法減數內減倍根自乘者爲負乘法若求腰率則正負互易視乘法正負與所乘根積同名者得積爲正異名者得積爲負根皆帶半故用倍與斜行同其遞取兩數乘除及易用和方減較方之故均詳整分法中不煩贅論求奇行直下積卽心角形腰較率
