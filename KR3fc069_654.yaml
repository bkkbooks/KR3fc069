body:
  text: 弦知求八綫術正弦求正切法以正弦為第一數次以半徑為一率正弦為二率二率自乘一率除之得三率置第一數以三率乘之一率除之得四率二除之為第二數次置第二數以三率乘之一率除之的六率三乘之四除之為第三數次置第三數以三率乘之一率除之得八率五乘之六除之為第四數次置第四數以三率乘之一率除之得十率七率之八除之為第五數如是遞乘遞除求至單位不止併諸數即正切
