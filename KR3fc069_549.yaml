body:
  text: 分子及一分母二分母三分母等分母既以二三四五遞加自乘後亦必以四九十六二十五遞乘也置本度矢以分子自乘乘之分母自乘除之為第一數論曰本度矢正矢也為三率本數之半三率用數為分子自乘寄分母自乘以之乘除本數入用數而得三率實數之半次以半徑為連比例第一率分母自乘除矢又二乘之為第三率
