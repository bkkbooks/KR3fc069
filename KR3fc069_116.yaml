body:
  text: 數而半之得零分三折半爲一分半五折半爲二分半卽零根在弧爲零分併兩零根其分偶一分半二分半併得四二分半三分半併得六皆偶數而半之得整分四折半爲二六折半爲三皆整根在弧爲整分弦分得併根之全矢分得併根之半故整偶率併爲弦其弧分與併整根等而得一三五等奇分則零偶率併亦爲弦其孤分與併零根等必得二四六等偶分矣整奇率併爲矢其弧分與併零根之半等而得一二三等整分則零奇率併亦爲矢其孤分與併整根之半等必得一分半二分半等零分矣設取整而遺零不惟弦分不全并不識矢之有零分抑知一整一零一奇一偶或合整
