body:
  text: 行首位第二行次位第三行三位按行以次遞降其上皆正其下皆負正相間在各形腰率則第一行一率第二形二率第三形三率按形以次遞降其上皆正負相間其下正則皆正負則皆負是正負之不同無異於半分也然深究其不同之故不特無異於半分亦仍無異於整分何也整分遞加數逐層逐位皆正而整分腰率恆一正一負相間兩相比較上位正負同者下位必異上者正負異者下位必同常一異一同相次而列今零分遞加數各首積以上皆正者在腰率則正負相間遞加
