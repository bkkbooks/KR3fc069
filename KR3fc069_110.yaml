body:
  text: 錢唐項名達著錢唐戴煦校半分起度弦矢率論數未有奇而不偶者而弦率則有奇分無偶分心竊疑之因研玩遞加圖見其奇行間偶行而列對根層適當其半默有會於用半之理恍然曰半者零五也弦率之得奇不得偶由於用全不用半知整不知零也於是以半分起根遞加全分如整分法本根求積別衍成遞加一圖復以半分起度遞加全分亦如整分法按度出線別聯成各種兩等邊三角三角形旣
