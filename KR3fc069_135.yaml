body:
  text: 求逐位積順而左則相加逆而右則相減以本層為本數以上層為加減數減法同名則減異名以加為減加則名從本數減則本數大名從本數減數大名從減數正負兩根間居中直下為第一行自此而左首正根一行為第二挨次為第三第四等諸正行自此而右首負根一行為第二挨次為第三第四等諸負行根積數左右方兩兩相等惟正負不等而亦有定率左方自首根首積之上位積皆正其下位直下皆一負一正相間右方根一層常負以下逐層一正一負相間平列向左遇各首積則斜折而下其斜行
