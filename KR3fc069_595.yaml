body:
  text: 次置第一數以三率乘之一率除之得第一率四除之又二除之三除之為第二數應減寄右次置第二數以三率乘之一率除之得第六率四除之又四除之五除之為第三數應加寄左次置第三數以三率乘之一率除之得第八率四除之又六除之七除之為第四數應減寄右論曰遞次乘法本應取分子母各自乘相減數今分子極多自乘後則愈多分母又為一不煩乘祗須減一九二十五等數是減數甚微可不必減其實弦求弦乘法有減數弧求弦乘法無減數非不
