body:
  text: 是術與前第一術同法惟前術第二數下階負是術第二數下奇數負偶數正補第二術以本乘方積檢開方表其積較本積稍大者用為借積其根為借根借積內減本積餘為減積以本積除減積得數為遞次乘法又以本乘方乘數加一為廉率廼置借根為第一數正次置第一數乘法乘之廉率除之為第二數負次置第二數乘法乘之廉率加一乘之二因廉率除之為第三數正次置第三數乘法乘之二因廉率加一乘之三因廉率除之為第四
