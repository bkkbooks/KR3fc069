body:
  text: 率及析分弦矢率實參列其閒不惟若是倍分者一分弧之幾常以一為分母析分者幾分弧之一常以一為分子今得零分則分子母不必定一任設幾分弧之幾無不可求因立此弧求他孤兩術以補所未備又不惟若是分子母既可任設則六十度通弦倍矢與半徑等諸率齊同取為分母任設某度為分子并諸率本數可省去不求但求遞加差數即得逐度分秒之通弦倍矢亦即得逐度分秒之正弦正矢因更立半徑求弦矢兩術以備製表之用似便於用孤約言之弦矢諸率其比例生於兩等邊三角其數本
