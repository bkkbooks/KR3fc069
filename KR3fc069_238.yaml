body:
  text: 形則界于丑為負形又求得負形腰界子以滅第一形底甲子餘甲界為第二形腰二率乘一率除得底甲乙以減第一形腰心甲餘心乙為第三形腰二率乘一率除得底乙丙以加第二形腰界乙得界丙為第四形腰二率乘一率除得底丙丁如是遞為加減乘除至第七心已庚形可得各腰底廼以負形腰界子卽金甲與第二形腰界甲相減餘界金即三分弧之一通弦第二形腰界乙與第四形腰界丙卽乙水相加得界水卽三分弧之七通弦依是遞加得界日卽三分弧之十三通弦界朔卽三分弧之十九通弦又以
