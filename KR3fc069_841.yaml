body:
  text: 子壬遂成癸率卯乙與壬辰寅癸與甲子丑壬三同勾之兩勾股形又自庚作橫線至申自辛作橫線至酉亦分戊丁象限為三分從戊坎半分戊艮一分半戊坤二分半各作小半徑於徑端作餘弦復引長直截橢圓界各作抵周線亦成戍坎離心與亥艮巽心與乾坤震心三同勾之兩勾股形此三小半徑所成句股形與三平圓通弦所成勾股形同式義與前圖同而
