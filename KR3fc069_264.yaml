body:
  text: 之幾易率法是也準整分率三分通弦二率一與一分通弦二率三正四率一負相當用為相當率列右線左以借二率三為分母除之得本二率三之一正借二率一正四率三之一負皆書分子寄分母為用二率各自乘半徑除之得本三率一寄分母自乘借三率一正五率二負寄分母七率一正寄分自乘為用三率亦卽乘法依次列相當率左復以求得第一形腰率列左線右腰率皆奇取用三率列右線右本率列上遞以本三率乘之一率除之得各本率分子皆一寄分則遞增
