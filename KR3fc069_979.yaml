body:
  text: 分弧二分弧三分弧一例夫自一分至四分而求加減差之例一一相同則求至千百分當亦莫不相同而可無疑矣此求通弦和用加減差之法所由立也定正負加減之名則本數為正者第一差用減為負數名減差第二差用加為正數名加差以下常一負一正相間本數為負者第一差以減為加反為正數名加差第二差以加為減反為負數名減差以下常一正一負相間總之不論本數正負第一差常與本數異名第二差常與本數同名以下各差皆與本數一異名一同名相次而列
