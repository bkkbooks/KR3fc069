body:
  text: 為第一數次以半徑為一率正弦為二率二率自乘一率除之得三率置第一數以三率乘之一率除之得四率四除之為第二數次置第二數以三率乘之一率除之得六率三乘之六除之為第三數次置第三數以三率乘之一率除之得八率五乘之八除之為第四數次置第四數以三率乘之一率除之得十率七乘之十除之為第五數如是遞乘遞除求至單位下止并諸數以減餘割即餘切上以正弦求者四術可得六線其餘矢一線正弦減半徑即得不須求也
