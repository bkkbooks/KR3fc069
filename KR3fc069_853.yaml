body:
  text: 一分近大徑端者為中前近小徑端者為中後用一百三十五度大矢即半徑多一四十五度正弦今以正弦如真數半徑如天元仿天元算式演之得式如下中後一分用四十五度正矢即半徑少一四十五度正弦相併得二半徑正弦正負相抵適盡弧分二除之又半之仍得二分半徑之一析象限為三分則居中一分用九十度正矢即半徑中前一分用一百五十度大矢即半徑多一六十度正弦中後一分用三十度正矢即半徑少一六十度正弦併中前後一分矢又併中一分矢得三半徑弧分三除之又半之仍得二分之一
