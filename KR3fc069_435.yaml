body:
  text: 加一分為諸分子故用整分率半分起度之界角形起半分遞加全分成各形而偶分母之分子則起一分遞加二分為諸分子二與一猶之全與半故用半分率求第一形之比例法以分母弧居中心角形腰奇分取一分為居中分偶分合兩分為居中分比兩分子相減弧居中心角形腰若半徑與第一形腰此比例取同式相當以分母弧居中心角形腰比分子弧相應界角形腰分子弧作兩半徑線界之界角形腰兩端抵半徑線上而與之相應若半徑與第二形腰此比例生於轉比詳見前三分四分五分諸圖説即折至多
