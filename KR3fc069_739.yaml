body:
  text: 凡應以廉率除者先乘以位數後乃除以十二應以廉率減一為乘法者則以十二減位數為除法雖不用廉率而廉率自寓其閒也以是觀之理本相通而術則嚫變本律居黃鐘正律半律之閒由比例乘除自正律而降從半律由遞加乘除復自半律而約歸本律其數不煩造作皆從律位而生位為天然素定之位因是而得數即為天然自具之數謂非律呂真數而何古法下生者三分損一十之一即十二之四故四乘黃鐘十二除之得林鐘應損數若先二除黃鐘八乘
