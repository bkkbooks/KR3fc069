body:
  text: 除之不受除卽以六十三爲首四乘積書寄分母七乘於右方增寄一乘法亦同上以六根十一乘四乘積六十三得六百九十三六除之分母除之均不受除六中有三迺三除之得積二百三十一應增寄分母及二除總爲寄分九乘又視前三乘積較平積寄分增四乘今五乘積較三乘積祇增三乘故更增寄分使齊其等轉以分母乘積得四百六十二爲首五乘積書寄分母十乘於右方凡平積三乘積五乘積均屬奇行立積四乘積六乘積均屬偶行每行上下位寄分宜使齊其等差以下各首積可準此遞求次求逐位積平積寄分較根多一四除迺四乘次根三以加首
