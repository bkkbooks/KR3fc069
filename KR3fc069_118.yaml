body:
  text: 得奇而合零得耦或半耦得整而半奇得零實備於遞加一圖而留其位以相示玩圖者觀其會通可也作半分起根遞加圖與整分異者大端有三一曰數別正負整分根積皆正半分則以反減不盡之故兼有負根負積乘除加減宜如法以定其名二日位分內外整分逐行之位至各首積而止半分因有負積故溢首積外首積之上為內位積皆正下為外位負正相間以至無盡三日分列母子整分所列皆實數半分則宜列分子而寄分母位愈降所寄之分亦愈多今準是作圖以明其法於後
