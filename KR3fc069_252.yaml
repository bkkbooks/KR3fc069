body:
  text: 一負為法除之所得諸率卽今所求第一形腰以整分之第二形腰二率一正或以第四形腰二率二正四率一負各乘半徑一率一正為實各以第三形腰一率一正三率一負為法除之所得諸率卽今所求一分弧第二形腰及二分弧第二形腰法一率除實心界土兩相乘為實一率仍得一心丁為法率一正為得得心子第一形腰數一率轉乘法三率得二
