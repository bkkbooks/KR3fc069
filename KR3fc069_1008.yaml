body:
  text: 補詳加研誦則四卷零分諸論果僅六紙而六卷橢圓求周亦圖解未立校勘未半頓觸前緒愴然久之夫以予賦質謭陋何足窺見藩籬特感平生諄屬之言不能不猝力竭情冀纂明於萬一緣本序中條目補完零分諸諭兼補求周圖解附卷末餘鄙見所及亦閒綴案語旣成因敘其顛末井錄先生來書於後以見予之不避僣越嫌葢自有故而讀先生書者當有以諒予之心矣咸豐丁巳二月錢唐戴煦跋附錄先生來書
