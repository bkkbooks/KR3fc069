body:
  text: 橢圓求周術法以小徑為徑求得平圓周為第一數正次以橢圓小半徑為第一率大半徑自乘小半徑除之轉減小半徑為第三率廼置第一數以三率乘之一率除之二自乘除之為第二數正次置第二數以三率乘之一率除之一乘之三乘之四自乘除之為第三數負次置第三數以三率乘之一率除之三乘之五乘之六自乘除之為第四數正次置第四數以三率乘之一率除之五乘之七乘之八自乘除之為第五數負依次遞乘遞除至單位下止第一數正第二數以下耦數正奇數負正負相減卽橢圓周
