body:
  text: 得三率二除之為第一數置第一數以三率乘之一率除之得五率四除之為第二數次置第二數以三率乘之一率除之得第七率三乘之六除之為第三數次置第三數以三率乘之一率除之得九率五乘之八除之為第四數次置第四數以三率乘之一率除之得十一率七乘之十除之為第五數如是遞乘遞除求至單位下止并諸數即正矢正矢減半徑即餘弦正弦求餘割餘切法以半徑自乘正弦除之得餘割又以正弦二除之
