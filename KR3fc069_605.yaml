body:
  text: 論曰遞次求數矢術本無四除今有此除者以所用三率乃四倍分子自乘乘三率數三率為本數乘法分子自乘為用數乘法是兼有兩種乘法而又多四倍宜除去之也餘與甬弦術同弧背求正弦論曰通弦折半為正弦是正弦乃半通弦也應以通弧為本弧而弧背得其半今以弧背求正弦是析弧背至極多分使一分通弦與弧合極多之總分乘之即弧背因以一分弧通弦求總分之倍弧半通弦一分為分母總分之倍為分子亦倍分求
