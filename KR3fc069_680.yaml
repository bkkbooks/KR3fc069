body:
  text: 積其根為借根本積內減借積餘為減積以本積除減積得數為遞次乘法又以本乘方乘數加一為廉率迺置借根為第一數次置第一數乘法乘之廉率除之為第二數次置第二數乘法乘之廉率加一乘之二因廉率除之為第三數次置第三數乘法乘之二因廉率加一乘之三因廉率除之為第一數次置第四數乘法乘之三因廉率加一乘之四因廉率除之為第五數如是挨次乘除得數至單位下止併第二數以下諸數與第一數相加得本乘方根術中檢表定位收零棄零等法均與第一術同至諸數加併後亦視單下一位零數滿五進為一而根微弱不滿五案其
