body:
  text: 子為第二層二分弧定分子為第三層兩相比較其第二第三第四數兩定分子相同無加減差第五數二分弧分子三十四本數分子三十五應減一是二分弧第一差起第五數也而應減數與本數分子之比例若一與三十五第六數定分子五十八本數分子六十三應減五而應減數與本數分子之比例若五與六十三因檢遞加數第五行其倍首位一得二與五位七十之比例亦若一與三十五倍次位五得十與六位一百二十六之比例亦若
