body:
  text: 四率二率自乘數旣得二率自乘數於是以大半徑除之得連比例三率若不求二率自乘數而先以大半徑除所列四率之前三率則求得四率亦必為大半徑除過之二率自乘數而卽所求連比例三率矣故以大半徑除一率大半徑幂仍得大半徑為一率又除二率得大半徑除徑幂較為二率卽小半徑自乘大半徑除之轉減大半徑之數術中所謂泛三率也又除三率得四分倍弧倍外矢之一半徑與通弦與倍矢為三率連比例故以半徑除四分通弦幂之一得四分倍矢之一所得四率卽求抵周線之連比例三率也
  hash: sha256:f9813859db01ed6ca2dbc1329cd0eb3c95ed45b06c9d005390b40377168e4482
