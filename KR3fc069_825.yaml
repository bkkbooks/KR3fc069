body:
  text: 四率二率自乘數既得二率自乘數於是以大半徑除之得連比例三率若不求二率自乘數而先以大半徑除所列四率之前三率則求得四率亦必為大半徑除過之二率自乘數而即所求連比例三率矣故以大半徑除一率大半徑幂仍得大半徑為一率又除二率得大半徑除徑幂較為二率即小半徑自乘大半徑除之轉減大半徑之數術中所謂泛三率也又除三率得四分倍弧倍外矢之一半徑與通弦與倍矢為三率連比例故以半徑除四分通弦幂之一得四分倍矢之一所得四率即求抵周線之連比例三率也
  hash: sha256:eda34b5497b05810bc936983dcef3e51d0b40ef6d668b82a3e4a458c83f2626a
