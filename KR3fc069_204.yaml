body:
  text: 乘二除之可得逐位平積求逐位立積依遞加法應以寄除三乘次位平積加首位立積得次位立積而首位立積本即首根次根三根遞乘數寄二除三除下同次位平積又即次根三根相乘數寄二除同既用同次根三根一以三增乘一以首根增乘則先加後乘得數亦等故以三加首根易為第四根遞乘次根三根而的次位利積又以寄除三乘三位平積加次位立積得三位立積而次位立積本即次根三根四根遞乘數三位平積又即三根四根相乘數既同用三根四根一以三增乘一以次根增乘則先加後乘得數亦等故以三加次根易為第五根遞乘三根四根而得三位立積依遞減法應以寄除三乘首位平積減首位立積得首位外立積而首位立積本即首根次根三根遞乘數首位平積又即首根次根相乘數既同用首根次根一以三增乘一以三根增乘則先減後乘得數亦等故以三檢第三根以為首負根與首根次根遞乘而得首位外立積又以寄除三成首位外平積減首位外立積得次位外立積而首位外立積本即首負根首根次根遞乘數首位外平積又即首負根首根相乘數即同用
