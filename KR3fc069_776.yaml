body:
  text: 周所由來故備載之有抵周線術而各橢弦可求有橢弦術而各橢弦和可求橢弦和既可求橢圓周即無不可求其用全在逐分倍外矢各三率不齊須以倍外矢齊之倍外矢不齊又須以半徑齊之所以能齊其不齊者則恃有遞加數一圓與之婉轉而符會觀後圖解便可洞然夫求平圓弧線非遞加數而其率不通今求橢圓弧線亦復如是然則圓理無窮一遞加數有以括之矣誠妙矣哉煦按總論云觀後圖解便可洞然而圖解實未有頗疑非完本迨觀本卷首云向思纂明之而病軀
