body:
  text: 分母相乘倍分子自乘減分母自乘之九倍其數亦同以乘平積分母自乘除之四除之三四遞除之為三乘積即五率倍根分子一加五分母一減五分母相乘倍分子自乘減分母自乘之二十五倍其數亦同以乘三乘積分母自乘除之四除之五六遞除之為五乘積即七率倍根分子一加七分母一減七分母相乘倍分子自乘減分母自乘之四十九倍其數亦同以乘五乘積分母自乘除之四除之七八遞除之為七乘積即九率如是遞求得各乘積凡定乘法正負及各積正負與耦行同若求腰較率則乘法正負互易亦與前同求耦行積半分用倍根及加減二四六等數並
