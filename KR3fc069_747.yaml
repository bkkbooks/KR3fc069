body:
  text: 圓逐分通弦和求相應之橢圓逐分通弦和如平圓象限析為二分則作四十五度正弦亦截分橢圓象限為二分如平圓象限析為三分則作三十度六十度兩正弦亦截分橢圓象限為三分平圓逐分弦等通弦亦等橢圓逐分弦不等通弦亦不等雖一等一不等而逐分相應先求本數各數內尚有加減差故先求者命為本數法置平圓逐分通弦和為第一數次以橢圓大半徑為第一率小半徑自乘大半徑除之轉減大半徑為第三率乃置第一數以三率乘之一率除之二自乘除之為第二數次置第二數以三率乘之一率除之三乘之四自乘除之為第三數次置第三數以三率乘之一率除之三乘
