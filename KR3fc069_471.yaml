body:
  text: 者其本率數均為一若分母耦而不用小分則其本二率數常為二三率數常為四故遞求四六八各耦率常得八與三十二與一百二十八等數遞求五七九各奇率常得十六與六十四與二百五十六等數求用率之本率寄分以本三率寄分乘數加一為寄分乘差置本二率寄分乘數以寄分乘差遞加之的各耦率寄分乘數置本三率寄分乘數以寄分乘差遞加之得各奇率寄分乘數定率者易借率為本率也前求第一二形腰率皆
