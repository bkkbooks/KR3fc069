body:
  text: 之二四相乘得八故八乘始為第一數次以半徑為連比例第一率八乘矢為第三率論曰本宜以分母自乘除倍矢為三率若不除而但倍其矢則三率中藏分母自乘巳兼有兩種乘法遞次求數可無四除今因術中通弧與弦矢相求概有四除故三率先增四倍也次置第一數以三率乘之一率除之得第五率四除之又三除之四除之為第二數次置第二數以三率乘之一率除之得第七率四乘之四除之又五除之六除之為第三數次置第三數以三率乘之一率除
