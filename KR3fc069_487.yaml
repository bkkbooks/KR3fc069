body:
  text: 負有一定之位亦與半分同其自首正根向下斜左線所聯各首正積以上之佐角則根積皆正自首負根向下斜右線所聯各首負積以上之右角則奇層正偶層負其各首正積向下斜右線所聯各積則恒一負一正相間其备首負積向下斜左線所聯各積則首積負者俱負正者俱正其自各首積直下線所聯各積則首積正者恒一負一正相間首積負者恒一正一負相間冠下圖自悉零分遞加數奇行亦即心角行腰率其正負之不同與整分異而與半分無異葢在遞加數則第一
