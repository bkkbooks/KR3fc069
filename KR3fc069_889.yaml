body:
  text: 徑平幂之半則三乘幂必得半徑三乘幂四分之一倍之得二分之一即五分其二段十五度與七十五度兩種正弦三乘幂之共即一段七分五釐半徑三乘幂十五度正弦與七十五度正弦各三自乘相併半徑三乘幂除之得八七五倍之得一七五故知為一段七分五釐半徑三乘幂是共得二十六段二分五釐半徑三乘幂也弧分六除之又全半比例十六除之得九十六分之二十六二五以四通之三約之仍得一百二十八分之三十五大率遞加一分弧則遞加四段三分七釐五毫半徑三乘幂而分母則遞加十六十六分之四三七五即一百二十八分之三十五故逐分遞加常得一百二十八分半徑三
