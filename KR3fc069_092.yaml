body:
  text: 率為負以下皆正負相閒凡乘法恆以一三五七等數自乘之與倍根自乘相減若相減適盡則已得末率不必再求根居兩數間其左右並位或隔二位隔四位各兩數相乘本為遞次乘法而各兩數相併常與倍根等是倍根其和也若其較則左右並位者其較一隔二位者其較三隔四位者其較五和自乘內減較自乘四除之與大小兩數相乘等故即以和之倍根自乘內減較自乘一九二十五等數而增一四除與遞取左右兩數相乘等也以上所論雖根積有異要皆遞求一位積也若求兩位併積宜就本法變通之遞取根層相連兩位數併之為併根遞取相連三位數以左右兩位數相併中位一數乘之二除之為併平積如前法宜以中位數乘右位數二除之得
