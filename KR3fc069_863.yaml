body:
  text: 半徑自乘得中前一分用矢為半徑中三十六度正弦甲中後一分為半徑少三十六度正弦甲各自乘相併得甲中前二分用矢為半徑多七十二度正弦乙中後二分為半徑少七十二度正弦乙各自乘相併得乙併各矢幂得兩段三十六度正弦幂兩段七十二度正弦幂多五段半徑幂而四段正弦相併即二段五分半徑幂以七十二度正弦自乘半徑幂除之又三十六度正弦自乘半徑幂除之相併得一二五倍之得二五故知為二段五分半徑幂是共得七段五分半徑幂也弧分五除之又全半比例四除之得二十分之七五以
