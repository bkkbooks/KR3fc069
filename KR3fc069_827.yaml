body:
  text: 一率大半徑二率小半徑自乘大半徑除之轉減大半徑三率四分倍弧倍外矢之一四率求抵周線三率此用四分倍外矢之一故求得四率即求抵周線之三率若徑用倍外矢為三率則所得必為求抵周線三率之四倍即術中所謂定三率故每數增四除也凡橢圓內容平圓自大徑所指起於若干度作半徑又作本度餘弦復引長直截橢圓界從圓心至直截處作橢圓抵周線成同勾之兩句股形小半徑為小弦抵周線為大弦若以小半徑求抵周線可用借小圖積開方法如圖乙甲為橢圓象限丙甲為平圓象限心丙心甲皆小半徑心乙為大半徑丙為大徑所指丙庚為所設弧度心庚亦小半徑巳庚為所設弧餘弦即辛庚倍弧外通弦庚丁二分之一巳戊為直截橢圓線心戊為橢圓抵周線成心巳庚戊同句之兩句股形心庚為小弦心戊為大弦如以心庚求心戊則當以心庚為連比例一率其求連比例三率當以
