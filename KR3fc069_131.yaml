body:
  text: 平積得十五為次位平積復四乘三根五以加之得三十五為三位平積如是順加而左得逐位平積皆正又四乘首根一以減首位平積餘一減數大易正為負為首位外平積復四乘負根一以減之餘三減數大易負為正為次位外平積復四乘負根三以減之異名以加為減得十五從本數為正為三位外平積如是逆減而右得逐位外平積立積寄分較平積多一二除乃二乘次位平積以加首立積得三十五為次位立積復二乘三位平積以加之得一百零五為三位立積如量順加而左得逐位立積皆正又二
