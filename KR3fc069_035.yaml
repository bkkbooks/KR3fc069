body:
  text: 如下圖半平圓析為十八分自心至周各作半徑線自界至一三五等奇分各作通弦線諸線相奕成兩等邊三角形凡十有七雖大小不同而皆同式何則心界甲形心乙丙形挨次鱗列漸小至心午未形其心角皆對一分弧必相等界甲乙形界丙丁形挨次鱗列漸大至界辰午形其界角皆對二分弧必相等界角對弧旣得心角之倍則心角界角亦必相等凡對弧同者界角恆得心角之半今界角對倍弧故與心角等心界甲形界甲乙形心角界角旣等甲角又屬同用角則乙角亦必與心界甲角等凡平三角形三角併之必一百八十度故此形兩角旣等彼形餘一角自不得不等界
