body:
  text: 率一率除之得借六率即以本三率乘本四率一率除之得本六率與之相當如事遞乘遞除得各耦緑亦兩兩對列是為用率凡借率乘法法首位乘實首位常為單一仍置首位法首位乘實三位法三位乘實首位兩數相併置次位法首位乘實五位法三位乘實三位法五位乘實首位併三數置三位如是遞乘遞併分置各位其分母則兩數相乘一不寄分一寄分者仍寄原分兩數均有寄分者則以兩寄分乘數相併加一為寄分乘數寄分母者為無乘數寄分自乘者為一乘如分母之
