body:
  text: 負兩行遞併併法同名加異名減併後約寄分使從減易而弦矢率即得矣今將界角形相等之偶行積兩行遞併其二率約二除之消其寄分餘率約四除之寄分亦消去一自乘得各偶分通弦率將心角形相等之奇行積各減半徑兩行遞併諸率皆約二除之寄分亦消去一乘得半分依分半分二分等倍矢率列式於左求二分通弦
