body:
  text: 除之得第七率四乘之五除之六除之為第三數次置第三數以三率乘之一率除之得第九率九乘之七除之八除之為第四數次置第四數以三率乘之一率除之得第十一率十六乘之九除之十除之為第五數論曰遞次求數無四除乃求矢本法以弧背為矢本弧故也餘與矢求通弧術同以諸數相并又為連比例第三率與一率半徑相乘開平方得第二率即弧背論曰并諸數得一分倍矢乘分母自乘數半徑乘
