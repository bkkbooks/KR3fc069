body:
  text: 式祇遞升一率而其數亦同定率之異者以用率皆奇數異於耦率也易五分之二第二形腰率此式各用率與前第二式同數亦按求得率而乘除之定率始異又此求得率較前第一式祇去一率除皆遞升一率而其數亦同定率之異者以用率皆耦異於奇率也煦案第一式定七率及定十一率之借率其十五率乘數一為十五萬九千三百九十正一為八百二十五萬一千三百二十正均分寄再乘因可用分母約故寄分減一乘蓋寄分之等已屬不齊則可約者當約之從簡也第三式定七率及定十一率之借率其十五率乘數亦同此法既得兩種第一二形腰率可以比例加減求各形腰
