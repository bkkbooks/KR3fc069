body:
  text: 分母既為三則除去三六九十二等數凡一二四五七八等數皆可為分子今以三之二三之一起度矢之分子可得其全而弦之分子祇一五七等奇分其耦分必析分母為六以六之五六之一起度方得三之二三之四等耦分弦率可知求奇分弦用原分求耦分弦用倍分不獨整分然零分亦然也
