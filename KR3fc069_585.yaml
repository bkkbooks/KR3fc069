body:
  text: 除之得第五率第一乘數乘之四除之又三除之四除之為第二數次置第二數以三率乘之一率除之得第七率第二乘數乘之四除之又五除之六除之為第三數次置第三數以三率乘之一率除之得第九率第三乘數乘之四除之又七除之八除之為第四數以諸數相併即所求矢單位以下棄之未至單位者依次求之論曰此二術乃求析分弦矢也析分弧之分子常為一其分母即所析弧分惟分子為一凡前所定二本術中應用分子乘者可省去不用乘法中本應以分子
