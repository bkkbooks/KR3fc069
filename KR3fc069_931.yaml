body:
  text: 五與六十三試以遞加數第五行自倍首位起取第五數以下本數分子按位挨次乘之又自五位起挨次除之為第一差第五數乘除得一以減本數分子三十五得三十四第六數乘除得五以減本數分子六十三得五十八第七數乘除得三十三以減本數分子二百三十一得一百九十八第八數乘除得九十一以減本數分子四百二十九得三百三十八均與各數定分子合第九數乘除得一千八百二十以減本數分子六千四百三十五得一差減數四千六百十五以較定分子應加一是二分弧第二差起第
