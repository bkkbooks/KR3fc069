body:
  text: 率法之相當率寄分畢則論用率寄分論定率寄分皆宜分別奇偶論之而易率法畢次論衍遞加數法亦論寄分論子母論正負論奇行偶行積子母互異論直行併行積子母互異而遞加數畢次論遞加數即各形腰率而正負不同論心角形腰與腰較率正負相夊論併積即弦矢率易正負有定法論矢率弦率子母全半之不同而弦矢率畢末乃依半分起度式分六術以明其算特彼論全半此論子母異同處略一分別可也至卷五卷六皆有舊稿且經編定只須照式録之今將各卷總為一束設有本鄙意而續
