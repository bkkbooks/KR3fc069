body:
  text: 細弧其弦矢可互求即弧與弦矢亦可互求此董氏倍分析分四術實為乙九術之原今更以分子母覈之而其理益顯蓋弦矢方邊也弧圓線也方有畫圖無盡分之設也可有盡而亦可無盡假其有盡者察數之變而還其無盡者得理之通弧與弦矢乃無可復遞此割圓之能事至九術而極而非有分子母亦無以啟其秘而發其扁也
