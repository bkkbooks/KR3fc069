body:
  text: 數所用行數皆與一分弧二分弧一例求四分弧定分子者四分弧用矢一為半徑多六十七度半正弦一為半徑少六十七度半正弦一為半徑多二十二度半正弦一為半徑少二十二度半正弦當先求兩正弦諸乘幂併數與半徑諸乘幂比例之率法以兩正弦自乘相併半徑幂除之得一為平方併率兩正弦三自乘相併半徑三乘幂除之得七五為三乘併率兩正弦五自乘相併半徑五乘幂除之得六二五為五乘併率如是遞求得七乘併率五三一二五九乘併率四五三一二五十一乘併率三
