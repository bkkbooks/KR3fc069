body:
  text: 析象限為四分則中前一分用一百十二度半大矢即半徑多一二十二度半正弦甲四分弦用兩種正弦故以甲乙別之中後一分用六十七度半正矢即半徑少一二十二度半正弦甲中前二分用一百五十七度半大矢即半徑多一六十七度半正弦乙中後二分用二十二度半正矢即半徑少一六十七度半正弦乙併中前後一分矢又併中前後二分矢兩數相併得四半徑弧分四除之又半之仍得二分之一大率弧分不論奇耦其中前後同分之用矢相併常得二半徑而奇分弧之中一分用矢
