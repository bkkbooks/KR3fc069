body:
  text: 乘首位平積以減首位立積餘一減數大易正爲負爲首位外立積復二乘首位外平積以減之餘一減數大易負爲正爲次位外立積復二乘次位外平積以減之餘五減數大易正爲負爲三位外立積如是逆減而右得逐位外立積三乘積以下準此遞求大約求各首積每增一乘除卽得增一乘之積而分毋亦增寄一乘遇二四六八十等數爲除法皆不受除宜按數更增其寄分遇六則三除之寄其二除遇十則五除之寄其二除遇十二則三除之寄其四除每奇乘積下位較上位分母增寄四乘偶乘積亦然至
