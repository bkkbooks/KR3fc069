body:
  text: 以通弦為第一數論曰析分術第一數本宜置通弦以分母除之但所求乃通弧得諸數後尚需乘以分母今先於第一數不除以代其乘明諸數皆為分母乘過數併之即通弧矣故即以通弦為第一數次以半徑為連比例第一率通弦為第二率二率自乘一率除之得第三率論曰本宜分母除通弦為二率以求三率今不除是二率為分母乘過數求得三率必為分母自乘乘過數
