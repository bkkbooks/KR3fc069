body:
  text: 除今試就求一分通弦並求通弦和本數歸本數不論正負分別推演如下求一分通弦者通弦為第一數泛三率乘通弦半徑除之二除之又半外矢乘之用倍外矢則多一四除今用半外矢者省四除也半徑除之為第二數泛三率自乘乘通弦半徑幂除之二除之一乘之四除之又半外矢幂乘之半徑幂除之為第三數泛三率再乘乘通弦半徑立幂除之二除之一乘之四除之三乘之六除之又半外矢立幂乘之半徑立幂除之為第四數此求一分通弦各歸本數法也若求逐分通弦和則當以通弦和為
