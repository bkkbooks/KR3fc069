body:
  text: 以用數除法除之也若以千萬為圓徑則求至第十一數并之得三千一百四十一萬五千九百二十六即圓周論曰第一數巳乘為六倍即遞得之諸數皆然并之必得六十度通弧之六倍即圍周也得數遞次漸降今約圓徑千萬為例計共八位求至第十一數巳抵單位不煩再求若增求之位愈多數亦愈密總論曰弧與弦矢不相通通之以極細分極細分通弦即弧倍矢即弧為二率之三率但本弧與極
