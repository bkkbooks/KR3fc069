body:
  text: 弦矢率分子以全惟耦而折半仍耦者則不待交互而自得弦矢率分子之全此以正銜正矢論弦矢率則然若今所云弦率乃通弧之通弦而矢率乃弧背之正矢故其子母全半之不同有如此求自根斜左一行積分子遞加分母為諸根分子置根分子以分母除之為根數根分子加分母以乘根分母除之二除之為平積根分子加倍分母以乘平積分母除之三除之為立積根分子加三分母以乘立積分母除之四除之為三乘積根分子加四分母以乘三
