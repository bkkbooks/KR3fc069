body:
  text: 於遞加兩等邊三角尖象也遞加數尖數也通方圓必以尖故自來割圓術不離勾股而得其象未得其數取數不無繁重自有零整分遞加而後象與數會分於是定率亦於是通分卽遞加數之根率卽遞加數之積分以子母管乎外圓涵方也率以奇偶應乎內方就圓也割圓術至此始無餘蘊爰乘數月暇著為圖説二卷友人王子琹逸嗜算術遍涉中西見是術愛之欲與社董術合刊為一刪囑余序其大意余因詳術所由不嫌辭費者亦以此通貫方圓之率非董氏理無自彰非杜氏法無自立非勾股割圓等法
  hash: sha256:3926c33e052bea533c5e13fee4793d2421ffb6de613186c31e828916953f2114
