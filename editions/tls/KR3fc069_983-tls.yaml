body:
  text: 周為第一數以大徑為一率求其減數減大平圓周而成橢圓周亦可用小徑平圓周為第一數以小徑為一率求其加數加小平圓周而成橢圓用求減數則與借大積開方法相通求加數則與借小積開方法相通葢二術兩相對待必得用小徑之術庶用大徑之術有所印證而益知其取數之確今依原術命題補衍於後橢圓內容平圓勻析弧分為幾取遞加奇分弧幾通弦求平圓自半分起遞加全分弧相應之橢圓逐分抵周線
