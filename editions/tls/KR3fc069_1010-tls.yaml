body:
  text: 厯學於中西術須一體視之不可有門戶之見又算術古疎今密習此道者往往以闢古自矜不知無古之疎安得有今之密不但無密恐井疎亦不可得究一理立一術以垂於後殊不容易我幸知之而乃肆口相詆乎品學醕美如閣下將來大著成時固無慮是然此病犯之極易顯涉筆時加意為禱弟於此道不過稍涉籓籬其稍可示人者祗弦矢互求及求橢圓弧線二種只因困於病魔亦已置之自去歲湘芸來力言此二種斷不可不可書且催促之兼為謀措刻資感其厚意故去夏及秋將弦矢術釋有三冊一
