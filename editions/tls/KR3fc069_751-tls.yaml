body:
  text: 幾則第幾數起以下各加差中又各有減差如是遞以偶數乘弧分加一定應加應減之各數次求第一次加差先定乘除法以二為應加第一數乘法倍分加一乘第一數乘法為第二數乘法倍分加二乘第二數乘法此所言第一數第二數專指應加數言非本數之第一數第二數也二除之為第三數乘法倍分加三乘第三數乘法三除之為第四數乘法如是遞加一乘除之得各乘法又視倍分為幾則後幾數之乘法折半即為其前幾數之除法加弧分二則倍分為四應加之第五數乘法折半即第一數除法應加之第六數乘法折半即第二數除法廼置應加各數各以乘法乘之除法
