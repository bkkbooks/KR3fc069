body:
  text: 之廉率減一乘之二因廉率除之為第三數次置第三數乘法乘之二因廉率減一乘之三因廉率除之為第四數次置第四數乘法乘之三因廉率減一乘之四因廉率除之為第五數如是挨次乘除得數漸降至單位下止前增求零數加增二位至單下二位止增三位或四位至單下三位四位止併第二數以下諸數與第一數相減得本乘方根單下一位零數滿五進為一而根微弱不滿五棄其害而根微強若零數共二位上一位空共三位或四位上二位空及上三位空者則棄其末位之零而根得整數第二術以本乘方積檢開方表其積巴本積稍小者用為借
