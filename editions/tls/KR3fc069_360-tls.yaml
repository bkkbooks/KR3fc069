body:
  text: 煦案四分弧通弦率其四分之幾折而爲二分之幾此耦分弧之通例若通弦逐率分母亦折而爲二此則偶然也葢四爲二之自乘數故可折非凡耦分弧皆可折而從半分弧也如前半分起度通弦率其通弦變爲二分四分等整分而逐率仍帶二爲分母此其徵也弦矢弧分及遞加數本同此分母倍矢之分子與遞加數等通弦之分子則爲遞如數兩分子之較與和
