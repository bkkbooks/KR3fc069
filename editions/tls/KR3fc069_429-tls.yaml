body:
  text: 其形最大零分第一形其底自圓內出圓外最小者必糃大於整分最大者必微小於半分整分第二形祗一無兩其形最大半分第二形有兩而等其形適中零分第二形兩不相等一大於半分一小於半分互為正負而皆較整分為小求第一二形腰率分母本弧無線可比不得不用借弧蓋一分母含有諸分子借分子小弧之線以為比例也本可不論奇偶概借用一分弧之通弦惟因易率時須寄其分而借半分起度諸率者其率又先有寄分若寄分大取數必繁不便於乘除加減今有奇
