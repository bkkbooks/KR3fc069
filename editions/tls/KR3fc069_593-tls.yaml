body:
  text: 以通弧為第一數寄左論曰第一數本宜置通弦以分子乘之分母除之今極細弧通弦乘分子即原設通弧分母又為一不須除故即以通弧為第一數次以半徑為連比例第一率通弧為第二率二率自乘一率除之得第三率論曰求三率本宜以極細弧通弦為二率自乘之一率除之得三率今用原設通弦代為二率是二率為分子乘過數求得三率必為分子自乘乘過數
