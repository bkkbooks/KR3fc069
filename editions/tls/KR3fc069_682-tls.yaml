body:
  text: 零而根徵強惟零數共二位上一位滿九共三位或四位上二位滿九及上三位滿九者則增其末位之零進為一而根得整數按是二術互相為用如術推算乘除一例而不煩惟患減積大降位稍難須求多數耳減積之大由本積稍遠於借積然本積居表中大小二積之間去小積遠去大積必近則用第一術去大積遠去小積必近則用第二術兩者相資其術始備且一盈一歉一減一加不易中自有交易者在此亦陰陽對待之理寓乎數中而不容有所偏局也補第一術
