body:
  text: 必為倍矢此兩形相比例為心界腰比界甲底若界甲腰與甲乙底是界甲者旣為此底復為彼腰遂成連比例三率故以半徑心界為一率一分通弦界甲為二率一分倍矢甲乙為三率三率旣全迺可求眾形之腰底各率求第三心乙丙形以第二形底甲乙減第一形腰心甲心甲卽心界得第三形腰心乙為一率一正三率一負心甲卽一率數大為原數甲乙卽三率數小為減數應於原數內減去減數故一率正三率負說詳加減以二率界甲底乘之一率心界腰除之得底乙丙為二率一正四率一負乘除後原數不動者以乘法除法皆祇一位又祇一數也遞降一率者以乘法較除法降一率也說詳乘除次求第四界丙丁
