body:
  text: 得四是為界角第二形下各腰內二率乘除得底降為三率卽其底內三率亦為一二三四等如根之一二三四等數由遞加根差而得也三率起於第二形底如上論界角形各底內三率旣為一二三四等數若取各底遞加成心角形各腰則三率必轉而相加一加二得三三加三得六六加四得十是為心角第三形下各腰內三率乘除得底降為四率卽其底內四率亦為一三六十如平積之一三六十等數由遞加根而得也四率起於第三形底如上論心角形各底內四率旣
