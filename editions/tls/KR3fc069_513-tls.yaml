body:
  text: 求兩耦行併積即通弦率併兩耦行根分子為倍根分子即弧分分子分母除之為倍根即為併根即二率倍根分子一加分母一減分母相乘即弧分分子自減分母自乘以乘併根分母自乘除之四除之二三遞除之為併立積即四率倍根分子一加三分母一減三分母相乘即弧分分子自乘減分母自乘之九倍以乘併立積分母自乘除之四櫥之四五遞除之為併四乘積即六率倍根分子一加五分母一減五分母相乘即弧分分子自乘減分母自乘之二十五倍以乘併四乘積四除之五六遞除之為併柳乘積即八率如是遞
