body:
  text: 之得一分通弦自乘乘分母自乘數開方得一分通弦乘分母數即弧背也圓徑求周論曰六十度通弦即半徑其通弧為圓周六之一今以圓徑求則是半其徑為六十度通弦求得通弧六乘之而得周也即通弦求通弧術亦即析分求弦術以徑三乘之為第一數論曰如通弦求通弧為第一數即用半徑但今所知為全徑應以二除所求為全周應先六乘二除
