body:
  text: 各差之所起則第六差起十二因弧分加一之第十三數第七差起十四因弧分加一之第十五數可類推矣第一差遞加行數用第三而各差除法位數皆起第三者乃倍弧分加一之數也第二差遞加行數用第三七差用第十一四差用第十五五差用第十九者乃三因倍分加一五因倍分加一七因倍分加一九因倍分加一之數也如是遞以各奇數乘倍分加一得各差所用遞加行數則第六差用十一因倍分加一之第二十三行第七差用十三因倍分加一之第二十七行又可類推矣細審一分弧遞求加減
