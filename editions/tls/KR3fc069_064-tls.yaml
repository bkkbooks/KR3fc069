body:
  text: 推計逐層各數左一右一常不動中閒諸位併上層兩數為下層一數如第三層中位數二為次層一一併數第四層中位數左右各三為第三層一二及二一併數第五層中位數左右各四為第四層一三及三一併數最中一位六為第四層三三併數以下可推亦可兩其上層各數差一位疊而併之成下層各數如第三層一二一為原數復以一二一為加數相差一位併之首位原數一無加數仍為一次位原數二加數一併得三第三位原數一加數二併得三末位加數一無原數仍為一是卽第四層各數以下可推此皆按層而計也顧是圖之式本如三角形逐層皆是底作底線聯之自右上而左下斜列諸行皆左腰作線聯為左線自左上而右下斜列諸行皆右腰作線聯為右線左線第一行起一本是一而
  hash: sha256:8f6df8414d205034b4d18414af4988498a2d918edab09f68a2dfa8e29482b69e
