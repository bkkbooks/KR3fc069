body:
  text: 平積得十五爲次位平積復四乘三根五以加之得三十五爲三位平積如是順加而左得逐位平積皆正又四乘首根一以減首位平積餘一減數大易正爲負爲首位外平積復四乘負根一以減之餘三減數大易負爲正爲次位外平積復四乘負根三以減之異名以加爲減得十五從本數爲正爲三位外平積如是逆減而右得逐位外平積立積寄分較平積多一二除迺二乘次位平積以加首立積得三十五爲次位立積復二乘三位平積以加之得一百零五爲三位立積如量順加而左得逐位立積皆正又二
