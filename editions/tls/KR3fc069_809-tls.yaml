body:
  text: 乘數何也凡弦幂為勾股幂之共今甲丁弦幂內含甲乙股幂及乙丁句幂甲丙弦幂內亦含甲乙股幂乙丙勾幂以兩弦幂相較則甲乙股幂可對消而所餘為兩弦幂之較者正兩勾幂之較故亦即二率自乘數也又如有同勾之兩勾股形有小弦求大弦則可用借小積開方捷法如後圓戊辛為大弦巳辛為小弦庚辛為同用之勾戊庚為大股巳庚為小股今有巳辛求戊辛則當以巳辛小弦為一率戊庚巳庚兩股幂之較為二率自乘數一率除之為三率理與前同特求法不同前用借大積法故第一數正而第
