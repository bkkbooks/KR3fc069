body:
  text: 因弧分加一之第十九數遞加數當用五因倍分加一之三十一行除法仍起第七位今第十九數之二差加數為十六億四千三百九十一萬八千八百七十一以較定分子應減五而應減數與第二差之比例若五與九十七萬三千八百九十六正與遞加數三十一行首位一與七位一百九十四萬七千七百九十二之比例相合乃以三十一行首位與七位乘除十九數第二差為第三差得五以減二差加數得十六億四千三百九十一萬八千八百七十五與定分子合通計求三分弧加減差其起差數及遞加
