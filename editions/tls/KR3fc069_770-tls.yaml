body:
  text: 第二數各以定三率乘之一率除之得五率四除之四除之為第三數次置第三數各以定三率乘之一率除之得七率三乘之四除之六除之為第四數次置第四數各以定三率乘之一率除之得九率五乘之四除之八除之為第五數次置第五數各以定三率乘之一率除之得十一率七乘之四除之十除之為第六數依次遞乘遞除得數漸小至單位下止第一數正第二數起下皆負正負相減即逐分橢圓通弦用一分倍外矢求得第一分橢弦用三分倍外矢求得第二分橢弦用五分倍外矢求得第三分橢弦總以倍外矢狐分加一折半數卿為所求橢弦之第幾分
