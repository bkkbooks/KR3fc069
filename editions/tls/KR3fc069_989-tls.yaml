  text: 率置第一數各以三率乘之一率除之得三率二除之又四除之為第二數正次置第二數以三率乘之一率除之得五率一乘之四除之又四除之為第三數負次置第三數以三率乘之一率除之得七率三乘之六除之又四除之為第四數正次置第四數以三率乘之一率除之得九率五乘之八除之又四除之為第五數負依次遞乘遞除至單位下止第一數正第二數以下耦數正奇數負正負相減卽逐分橢圓通弦橢圓小徑作平圓取一象限勻析為幾分以平
