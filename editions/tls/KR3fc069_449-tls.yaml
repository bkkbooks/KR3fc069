body:
  text: 率二之分母與半分之分母兩相雜糅當合兩分母用弧分為分母法視四率以下半分分母乘數減一以借弧分母如乘數以乘之分母遂變為弧分其四率以下復以弧分自乘乘之以齊其等半分通弦率自六率以下分母均遞增四乘惟四率僅弦寄自乘較少二乘今雖變用狐分為普母而寄分乘數與原率同故以分母自乘通乘之其等乃齊弧分不論奇耦其乘法借三率均用整分倍矢率率皆實數其位亦有盡而即為借弧通弦自乘一率除之之數其寄分須視通弦以為準弧分奇而通弦分母用小分者視小分為分母自乘數則借
