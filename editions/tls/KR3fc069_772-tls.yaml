body:
  text: 按求逐分橢弦第一數同用一分平弦以下各數亦同一乘除法惟所用三率則各不同以各有所用倍外矢故也三率內各藏一倍外矢五率內各藏一倍外矢自乘數七率內各藏一倍外矢再乘數遞降雨率即遞增一乘故各率之差悉由於各奇分倍外矢必究明倍外矢不齊之致而後可立法齊之也平圓一象限勻析弧分為幾取遞加奇分弧幾通弦求與平圓至半分起遞加全分弧相應之橢圓逐分抵周線如一象限析為二分取一分三分兩通弦求與半分二十二度三十分及二十半六十七度三十分相應之橢圓兩抵周線析為三分取一分三分五分三通弦求與半分十五度一分半四十五度二分半七十五度相應之圓三抵周線法以大半徑為第一數取各奇分通弦各自乘半徑除之各減四半徑為各倍外矢又以大半徑為一率小半徑自乘大半徑除之轉減大半徑為泛三率以乘各奇分倍外矢一率除之為定三率四除之二除之為第二數次置第二數各以三率乘之一率除之得五率四除之四除之為第三數次置第三數各以三率乘之一率除之得七率三乘之四除之六除之為第四數次置第四數各以三率乘之一率除之得
