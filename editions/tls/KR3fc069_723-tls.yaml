body:
  text: 法曰十二律為律數所求律上距黃鐘幾位為位數以二為遞次除法廼置黃鐘為第一數次置第一數位數乘之律數除之二除之為第二數次置第二數位數與律數相減乘之二因律數除之二除之為第三數次置第三數位數與二因律數相減乘之三因律數除之二除之為第四數次置第四數位數與三因微數相減乘之四因律數除之二除之為第五數如是挨次乘除得數漸小至單位下止廼併第二數後諸數與第一數相減得所求律算式
