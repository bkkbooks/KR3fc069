body:
  text: 形腰爲五分之一與四起度者視分母奇其數五卽取整分第五形腰率爲除法兩分子相減亦得奇其數三卽取整分第三形腰率爲乘法乘除半徑得第一形腰求第二形腰仍以求第一形之除法爲除法又分母奇分子爲一者倍得二卽取整分第二形腰率分子爲四者倍得八卽取整分第八形腰率為乘法乘除半徑得第二形腰試圖以明之火土本弧五分爲分母界土一分界火四分爲分子心甲子卽今所求第一形與心火土形同式心甲心子爲兩腰界子爲一分弧第二形腰界甲卽金子爲四分弧第二形腰作土界土已以至土木等線卽顯圖中各形與整分起度諸三角相當彼之一分敫當今一分故借一分通弦爲二率自心土界以至心丁乙皆當彼心角形自土界壬以至土癸木皆當彼界角形廼比例之心丁土形與心丙子形同式以心丁比心丙若心土與心子而心丁者卽整分第五形腰心丙者卽整分第三形腰故以之乘除心土半徑得心子第
