body:
  text: 分則通加分母除求耦行直下積即界角形腰率置本行根分子在界角形為形數折半乘分母內減分母子相減數分母除之為根數即二率根分子一加分母一減分母相乘分子自乘減分母自乘其數亦同以乘根分母自乘除之二三遞除之為立積即四率根分子一加倍分母一減倍分母相乘分子自乘減分母自乘之四倍共數亦同以乘立積分母自乘除之四五遞除之為四乘積即六率根分子一加三分母一減三分母相乘分子自乘減分母自乘之九倍其數亦同以乘四乘積分母自乘除之六七遞除之為六乘積即八率如是遞求得各乘積凡乘法根分子大加減數小則兩數同名乘得正乘法根分子小加減數大則兩數異名乘得負乘法若求腰率則正負互易與半分同視乘法正負與所乘根積同名者得積為正異名者得積為負求奇行直下積即心角形腰較率併左右兩耦行根分子為本行倍根分子在心角形為形數乘分母內減分母子相減之倍數倍根分子一加分母一減分母相乘倍分子自乘減分母自乘其數亦同分母自乘除之四除之二除之為平積即三率倍根分子一加三分母一減三
