body:
  text: 於丑則子丑必同壬癸即外圓與卯巳未弧同度之通弦故午壬與寅子即卯辰之比同於丁乙與戊巳之比以大小同度兩通弦比大小兩圓徑卯未與子丑即壬癸之比同於庚辛與甲丙之比亦兩通弦比兩圓徑而全與全原同於半與半則酉壬比酉子必同於心乙比心巳而申未比申丑亦同於心辛比心丙矣凡橢圓外切平圓平分一象限為若干分弧每弧作通弦於通弦下端各作橫截線截橢圓界為若干分弧亦每弧作通弦其外平圓逐分弧相等通弦亦相等橢圓逐分弧不等通弦亦不等復從平橢兩通弦
