body:
  text: 腰界丑與第四形腰界卽丑木相加得界木卽三分弧之五通弦第四形腰界卯與第六形腰界辰卽卯月相加得界月卽三分弧之十一通弦依是遞加得界望即三分弧之十七通弦又以第一形腰較子土與第三形腰較丑土相減餘酉土之倍卽三分弧之一倍矢第三形腰較寅青與第五形腰較卯青相加得申青之倍卽三分弧之四倍矢依是遞加得倍亥黃卽三分弧之七倍矢一切比例加減悉與整分半分同惟弧分子小於分母者通弦倍矢皆相減而得但零分之第一二形腰溢在圜外與本弧通弦率不相通今欲求其腰率必借
