body:
  text: 丙丙併各矢三乘幂得二段十五度正弦三乘幂二段四十五度正弦三乘幂二段七十五度正弦三乘幂多十二段十五度正弦平幂乘半徑平幂十二段四十五度正弦平幂乘半徑平幂十二段七十五度正弦平幂乘半徑平幂多六段半徑三乘幂而十二段四十五度正弦幂乘半徑幂卽六段半徑三乘幂四十五度正弦幂得半徑幂之半其十二段十五度正七十五度兩種正弦幂乘半徑幂之共卽十二段半徑三乘幂七十五度正弦卽十五度餘弦合正餘弦幂卽半徑幂其二段四十五度正弦三乘幂卽五分半徑三乘幂平幂得半
