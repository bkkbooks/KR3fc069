body:
  text: 總分取其正矢以求一分弧倍矢一率乘之開方得一分弧通弦總分乘之得弧背一分為分子總分為分母奕析分求矢術也以正矢倍之為第一數論曰第一數本宜分母自乘除倍矢今不除而但倍其矢是為分母自乘乘過數次以半徑為連比例第一率倍正矢為第三率論曰三率與第一數等亦為分母自乘乘過數次置第一數以三率乘之一率除之得第五率三除之四除之為第二數次置第二數以三率乘之一率
