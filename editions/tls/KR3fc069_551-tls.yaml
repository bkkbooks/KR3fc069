body:
  text: 論曰三率為本數乘法乃倍矢也正矢得其半必二乘之方可為遞次乘法分母自乘除矢者亦以省後遞次之除也置第一數以三率乘之一率除之得第五率第一乘法乘之三除之四除之為第二數次置第二數以三率乘之一率除之得第七率第二乘法乘之五除之六除之為第三數次置第三數以三率乘之一率除之得第九率第三乘法乘之七除之八除之為第四數依是遞次乘除得各數漸小至單位止論曰遞次先得本數次入用數俱等通弦惟三率
