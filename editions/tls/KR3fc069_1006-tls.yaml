body:
  text: 于束髮聞先生精於算而閉門養疴未便輕謁丙戍秋予補四元玉鑑細草成假錄于吉甫王吉先生高足也先生因是獲覩予書卽命駕見過引為忘年交顧先生十年以長且夙成名得未敢安也然自是常相過從遂共定開方捷術而予對數簡法亦過蒙賞鑒譽戊申冬先生來書懇到詳勉無所不盡未言弦矢互求橢圓求周二種為愜意之作恐病軀不及葴事乞代整理彼時方謂殆謙讓語未以為意逾年而先生意逝矣去歲哲嗣豕霞大兄以遺書象數一原囑校
