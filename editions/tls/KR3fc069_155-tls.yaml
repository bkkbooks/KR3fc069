body:
  text: 書左線左以減右實無對易為負書右線右得數一率除之又折半得七率二負分寄十乘書得數七率之位減過乘數除過負實均抹去復以得數七率三率相乘倍之得五率四正又得數五率自乘得五率一正皆分寄十三乘並書左線左併以減右實無對易為負書右線右得數一率除之又折半得九率五負分寄十四乘書得數九率之位如是按上下之位挨次遞乘併以減實一率除之折半可得各率此數開方不盡約開至十五率止所得之數即餘弦率煦案率有線與面之分式中惟得數一行各率為線其餘各率皆面也如云一率二率三率即諸率自乘數乃一率二率三率之面而一率乘三率與二率自乘數同故一率除二率之面而得三率一率乘五率與三率自乘數同故一率除三率之面而得五率一率乘七率及三率乘五率與四率自乘數同故一率除三率乘五率即如除四率之面而得七率一率乘九率及三率乘七率與五率自乘數同故三率乘七率可與五率自乘數相併一率除之而得九率於可類推除法是傲此次餘弦求正割
