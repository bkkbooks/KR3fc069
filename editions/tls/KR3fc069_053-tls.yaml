body:
  text: 對皆屬減數故易其正負相加得酉乾之倍三率四正五率一負為二分倍矢以次遞求逐分約法曰以界角相連兩形之腰遞相加得逐分通弦以心角相連兩形之腰較遞相加得逐分倍矢求腰較取前所得各心角形腰率減去一率餘率易其正負如法列式於左逐分通弦率第二形腰界甲一分通弦第二四形腰相加得界坎三分通弦第四六形腰相加得界震五分通弦第六八形腰相加得界離七分通弦
