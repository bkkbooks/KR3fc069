body:
  text: 作左右兩線列實一率一正二率四之負於右線右二率書分子應寄四除四乃分母二自乘之數故旁記自乘開方法先以實一率一正開方乃得一率一正為初得數書左線右一率之位實之率已開過作線抹去迺用初得數一率一正為除法除實二率又折半得三率八之負八乃分母在乘數故旁記再乘書得數三率之位實之二率已除過作線抹去復以得數三率自乘之得三率一正分寄五乘為乘數書左線左以減右實無對易為負書右線右得數一率除之又折半得五率一負分寄六乘數得數五率之位減過之乘數除過之負實均作線抹去復以得數五率三率相乘倍之得四率二正分寄九乘為乘數
