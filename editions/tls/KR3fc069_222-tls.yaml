body:
  text: 奇行根層無數併積之根適當偶行故與求偶行直下積乘法相同除法差一數所得積亦差一乘又求矢術遞次本無四除此則增四除而與通弦同法法雖同意則有異通弦故用倍根增四除而倍根卽弧分倍矢亦因用倍根增四除而倍根非弧分乃弧之分子其分母則爲二以四除者實以分母自乘除也故遞次之四除通弦其常而倍矢其偶
