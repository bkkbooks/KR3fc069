body:
  text: 右位平積中位數乘左位數二除之得左位平積乃併之爲併平積旣同以中位數爲乘法又同二除則先併後乘除與先乘除而後併一也遞取相連四位數以最左右位兩數相併中閒並位兩數相乘以乘之二除之三除之爲併立積如前法宜以中閒並位兩數相乘以乘右位數二三遞除之得右位立積中閒並位兩數相乘以乘左位數二三遞除之得左位立積乃併之爲併立積旣同以並位兩數相乘爲乘法又同用二三除則先併後乘除與先乘除而後併一也下仿此遞取相連五位數以最左右位兩數相併中位一數乘之隔一位兩數相乘再乘之二除之三除之四除之爲併三乘積遞取相連六位數以最左右位兩數相併中閒並位兩數相乘以乘之隔二位兩數相乘再乘之二除之三除之
