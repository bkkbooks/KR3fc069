body:
  text: 如圖第一層根差皆一第二層爲根取二之一爲首根寄其分母用其分子首根卽爲一書寄分母於右方以分母乘根差得二首根一爲分子根差一實歎故以分母通之自首根向左順加得三五七九等諸正根又自首根向右逆減則反減而得負根一由是恒與根差異名應以加爲減亦得三五七九等諸負根次求各首積依鹽分法宜以次根乘首根二除得首平積三根乘首平積三除得首立積四根乘首立積四除得首三乘積今諸根皆分子每乘後應遞以分母除之而分母恒除實不盡又除法中二四六八等偶數皆內含分母
