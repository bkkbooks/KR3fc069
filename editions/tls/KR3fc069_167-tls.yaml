body:
  text: 遞降其上一正一負相間其下正則皆正負責皆負就遞加數正負論此按形遞降諸率均聯於首根首積之線其上數皆正其下正負間行與列就應加應減論腰底率宜一加一減而得後形遞加數向左順求則用加而不用減就實加實減論此遞降之線其上用加其下用減因在上之腰底率應加者必同名應減者必異名而遞加數則皆同名故彼此皆加也在下之腰底率應加者必異名應減者必同名而遞加數則皆異名故彼此皆減也由是觀之其正負不同應加應減亦不同而實加實減則同故得數遂無不同兩不相謀而自然相合亦可知圜內諸形率在在一遞加數整分起度者如是半分起度者亦無不如是矣第九形腰心辛小於第十形底壬癸故用反減所得第十一形腰底率正負宜互易以其過半周也自過半周後求界角形本宜用加易為減求心角形本宜用減易為加界角形率正負如前心角形率正負與前相反既驗知半分起度腰底率與半分起根遞加數等則欲求嫌矢帥者但取遞加圖中各積依前法易其正
