body:
  text: 五率一率乘七率者命為七率一率乘九率者命為九率即一率除得數耦率乘法凡三率乘二率即一率乘四率面機在二三率之間不可以率數名三率乘四率五率乘二率即一率乘六率面積在三四率之間三率乘六率五率乘四率七率乘二率即一率乘八率面積在四五率之間乘得數後亦按位遞併分置各位其一率乘幾率者命為幾率亦即一率除得數凡乘的數皆位位相連一率除後則每率間一空位凡分母耦而折半則奇者其分母僅得弧分之半求得各用率之借率後當變用弧分為分米何也
