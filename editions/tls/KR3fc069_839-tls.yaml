body:
  text: 巳壬者可用心丑大半徑為借一率泛三率乘三分弧乙丑之倍倍外矢大半徑除之為定三率有庚乙求庚癸者可用心寅大半徑為借一率泛三率乘五分弧乙寅之倍倍外矢大半徑除之為定三率矣凡橢圓內容平圓平分一象限為若干分弧逐分作平橢兩通弦所成同句之兩勾股形與從大徑所指自半分起遞加一分各作小半徑及抵周線所成同勾之勾股形兩兩同式如圖甲乙丙丁為橢圓戊乙已丁為內容平圓平分戊乙象限為三分各作通弦又作橢圓相應之通弦復移庚率至辰癸移戊庚至
