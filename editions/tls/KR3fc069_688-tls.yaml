body:
  text: 數負次置第四數乘法乘之三因廉率加一乘之四因廉率除之為第五數正如是挨次乘除得數至單位下止併正數與併負數相減得木乘方根是術與前第二術同法惟前術第二數下階正是術第二數下奇數正偶數負總論曰遞乘遞除術以開方平方向嘗為八線互求之用戴君顎士對數簡法亦用之而未能推及諸乘方者以乘多則比例難尋廉式又繁而不可御也由今思之遞乘遞除其數生於比例而成於遞加以比例論平方以借根為一率減積之根為二率求得三
