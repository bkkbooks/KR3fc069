body:
  text: 乘正黃鐘與應鐘十一乘等積開一十乘方得應鐘正黃鐘六乘乘半黃鐘四乘與仲呂十一乘等積開一十乘方得仲呂半黃鐘六乘乘正黃鐘四乘與林鐘十一乘等積開十一乘方得林鐘蓋此諸律位數雖不若蕤賓之與黃鐘相當而以自乘再乘等通其比例亦可以得等積所難者諸乘方開頗繁重故世子第求蕤賓一律不復以黃鐘遍求今則用遞乘遞除術轉變而消融之覺律本同源法師一例亦足極比例開方之變而濟其所窮矣新定算律術
