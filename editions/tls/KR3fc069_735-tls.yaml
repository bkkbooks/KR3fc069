body:
  text: 十乘為應鐘本積得借積二千零四十八之一每降一律正律減一乘半律增一乘借積分母亦增一倍此各律比例之差而廉率則同為十二究其差所由來大呂積二之一者以其距黃鐘一位左旋一周十二律會於黃鐘半律故太箊積四之一者以其距黃鐘二位左旋二周二十四律會於黃鐘四之一故夾鐘積八之一者以其距黃鐘三位左旋三周三十六律會於黃鐘八之一故應鐘積二千零四十八之一者以其距黃鐘十一位左旋十一周一百三十二律會於黃鐘二千零四十八之一故設欲使比例齊同
