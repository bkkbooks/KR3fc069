body:
  text: 術有四除欲同之使歸一例也不知通弦度越分而加為遞加數兩根相併其弧分也屬倍數倍矢度按分而加為遞加數之根其弧分適得本數故弦之弧分為和一三五為其較矢之弧分為半和一二三為其半較和較各自乘相減得大小兩數相乘四倍用為乘法不得不增四除半和較各自乘相減適與大小兩數相乘等無所用其四除此葢象數之自然不容強之使同者強同之失其所由來矣且立術尚簡增乘增除徒多繁繞自宜逕置弧分自乘遞減一四九等為乘法遞次省去四
