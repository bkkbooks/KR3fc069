body:
  text: 第幾率而逐數乘除奕但以加倍廉率及加減一隱括其數今既專論平方且欲令通於橢圓當明其所用何率及逐數乘除之實數矣凡借大積而即以大積除減積為遞次乘法者係用大積借根為率大積內減本積為二率自乘數一率借根除之為三率求法以一率為第一數正置三率二除之二即平方廉率為第二數負置第二數以三率乘之一率除之得五率一乘之即廉率減一四除之即二因廉率下可類推為第三數負置第三數以三率乘之一率除之得七率三乘之六除之為第四數負置第四數以三率乘之一率除之得
