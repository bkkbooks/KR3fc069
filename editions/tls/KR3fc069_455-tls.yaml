body:
  text: 七率轉以小分三乘乘之寄小分七乘於右以下每率增四乘乘之小分亦增寄四乘如借二率為小分再乘數則借三率之三率必為小分五乘數三率既除為一以小分除其五率寄小分四乘於右七率轉以三分三乘乘之寄小分九乘於右以下每率增五乘乘之小分亦增寄五乘餘可類推通弦分母變用弦分者則借三率之三率為半弧分自乘數三率既除為一自五率以下先以四通乘之然後以弧分自乘乘其五率寄分母三乘於右以弧分五乘乘其七率寄分母七乘於右以下
  hash: sha256:629ae9ad75cd7c1970e9c8a43e2e80d289ef369b92aac7db01537c430becdf3f
