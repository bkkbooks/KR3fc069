body:
  text: 分子合第七數乘除得三十三以加一差減數十六五負得二差加數十六五正以較定分子尚應減五是第七數以下當有第三差也而應減數與第二差之比例若五與三十三第八數乘除得九十一以加一差減數七十一五負得二差加數十九五正以較定分子十六尚應減三五而應減數與第二差之比例若三五與九十一因檢遞加數第一十行其首位一與三位六十六之比例亦若五與三十三次位十一與四位二百八十六之比例尞若三五與九十一試以遞加數第十一行自首位起取第七數以下第
