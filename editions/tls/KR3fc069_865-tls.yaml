body:
  text: 二五約之仍得八分之三大率遞加一分弧則遞加一段五分半徑幂其分母則遞加四而四分之一五卽八分之三故逐分遞加常得八分半徑幂之三就本數而論則三乘八除可代倍矢幂及半徑幂之乘除若就前一數加乘加除求本數則前數已含一乘二除是加三乘四除一與三遞乘二與四遞除卽三乘八除可代本數弧分除倍外矢幂之乘半徑幂之除也惟就象限為一分弧則用矢幂為八分半徑幂之二尚有加減差另條詳論於後第四數用半外矢立幂析象限為二分則中前一分
