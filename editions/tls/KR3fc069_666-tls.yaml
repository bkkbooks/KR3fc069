body:
  text: 乘之一率除之得五率四除之為第二數次置第二數以三率乘之一率除之得七率三乘之六除之為第三數次置第三數以三率乘之一率除之得九率五乘之八除之為第四數次置第四數以三率乘之一率除之得十一率七乘之十除之為第五數如是遞乘遞除求至單位下止并諸數即餘知餘矢減半徑即正弦正矢求正割正切法以半徑自乘正矢減半徑除之得正割又以正矢減半徑二除之為第一數次以半徑為一率正矢減
