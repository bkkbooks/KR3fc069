body:
  text: 矢率今置本度通弦者定二率本數也分子乘分母除者於二率本數中融入用數也本數用數原是為二率實數次以半徑為連比例第一率分母除通弦為第二率二率自乘一率除之得第三率論曰此定諸率本數之乘除法也求率法每求一數遞降兩率故必以三率為乘法一率為除法通弦旣卽二率本數便宜自乘之一率除之以求三率今不逕用通弦而以分母除通弦是二率為分母除過之數求得三率必為分母自乘除過之數
