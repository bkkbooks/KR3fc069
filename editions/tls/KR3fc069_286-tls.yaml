body:
  text: 為便今推三分之二起根各數首層根差皆一次層為根以分子二為首根分母乘根差得三自首根順加得五八十一等根皆正逆減得一四七十等根皆負負根祇列其一餘可約知寄分母於右方正負兩首根一二相乘得二二除之得一負分母除之不受除即為第一行平積寄分增為自乘次正根五乘平積得五負三除之分母除之均不受除即為第二行立積增寄分為三乘次負根四乘立積得二十四除之仍得五分母除之不受除即為第一行三乘積增寄分為四乘第三正根八乘三乘積得四十五除之
