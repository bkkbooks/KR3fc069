body:
  text: 皆於二之一應各以距黃鐘位數除之除二周二十四律三周三十六律以及十一周一百三十二律悉為一周十二律而廉率所用之全律十二其數亦隨除而降大呂廉率以一除故仍為一餘則皆降太簇廉率六夾鐘廉率四姑洗廉率三仲呂廉率二又五之二賓廉率二林鐘廉率一又七之五夷則廉率一又八之四南呂廉率一又九之三無射廉率一又十之二應鐘廉率一又十一之一如是則積之比例等廉率各不等比例等故遞次皆用二除廉率不等而又帶零故省去不用仍用十二而寄其位數之除
