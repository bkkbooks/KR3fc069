body:
  text: 通弦丙坎卽界乙亦卽界甲推之戊震卽界丁亦卽界丙庚離卽界己亦卽界戊均為各界角形腰亦可以第二形腰界乙二率一正與第四形腰界丙二率二正四率一負相加得界坎二率三正四率一負為三分通弦界丙與坎乙等求二分倍矢以第三形腰與半徑較得丙乾倍之加第四形底丙丁得酉乾之倍卽二分倍矢設自界作垂綫至酉則酉乾卽正矢酉點居丁丙底之半酉丙加丙乾為正矢則丁丙加內乾之倍必為倍矢下可類推又丙乾卽乙甲推之戊坎卽丁乾庚艮卽巳坎均為各心角形腰與半徑之較亦可以第三形腰較卽腰與半徑之較也省日腰較丙乾三率一正與第五形腰乾丁乾三率三正五率一負第五形腰本為一率一正三率三負五率一正今與半徑一率相減半徑為原數一率同名相減適盡餘率無
