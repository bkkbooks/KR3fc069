body:
  text: 須通分也借率與求得率互有正負須認明借率與借率係相併借率與求得率係相減而求得率為本數其正負加減術凡相併同名則相併異名則相減而名從多數凡相減異名則相併而名從本數同名則相減本數多名從本數本數少名異本數凡以求得率或求得率減餘乘用率之本率其有寄分者即於本率分母增寄其分求得率與本率其所寄分母故已齊同也凡衍遞加數以本位向上斜左線所聯根層之左
