body:
  text: 正弦求正割法以半徑為第一數次以半徑為一率正弦為二率二率自乘一率除之得三率二除之為第二數置第二數以三率乘之一率除之得五率三率之四除之為第三數次置第三數以三率乘之一率除之得七率五乘之六除之為第四數次置第四數以三率乘之一率除之得九率七乘之八除之為第五數如是遞乘遞除求至單位下止并諸數即正割正弦求正矢餘弦法以半徑為一率正弦為二率二率自乘一率除之
