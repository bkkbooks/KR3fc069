body:
  text: 異者知求各差之數不外乎整分遞加數以以逐分弧分子與本數分子之同異互相比較而益知用遞加數自有一定之例而不紊推演如下求本數母子者起第二數二分之一三乘四除得八分之三乘法乘子除法以乘其母為除為第三數母子五乘六除可用三約得十六分之五為第四數母子七乘八除得一百二十八分之三十五為第五數母子九乘十除可用五約得二百五十六分之六十三得第六數母子十一乘十二除可用三約得一千二十四分之三百三十一為第七數母子如是遞求得逐數母子
