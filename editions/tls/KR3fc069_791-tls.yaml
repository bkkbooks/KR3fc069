  text: 上端各作直線與橫截線取直角遂成各種勾股形其兩相應之通遇所成勾股必同用一股而勾則平大而橢小其逐分大小兩勾之比例皆同於大小半徑之半例如圓甲癸為橢圓象限甲乙為平圓象限甲心心乙皆大半徑心癸為小半徑平分甲乙為甲丙丙丁丁戊戊乙相等之四分弧作甲丙丙丁丁戊戊乙相等之四通弦於是從棺至子從丁至戊從戊至亥各作橫截線截橢圓象限為甲巳巳庚庚
