  text: 率小半徑心癸之較故比例亦同大小半徑也凡橢圓內容平圓平分一象限為若干分弧每弧作通弦於通弦上端作直截線引長之截橢圓界為若干分弧亦每弧作通弦其內平圓逐弧與弦俱相等橢圓逐分弧與弦俱不等復從平橢兩通弦下端作橫線與直截線取直角成各種勾股形其平橢兩相應之通弦所成勾股必同用一勾而股則平小而橢大其逐分大
