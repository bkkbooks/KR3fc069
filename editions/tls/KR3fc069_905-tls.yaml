body:
  text: 之比例若一與三第四數本數分子五一分弧分子二應減分子三而應減數與本數分子之比例若三與五因檢遞加數第三行其倍首位一得二與三位六之比例亦若一與三其倍次值三得六與四位十之比例亦若三與五試以遞加數第三行自倍首位數起取第三數以下本數分子按位挨次乘之又自三位數起挨次除之為第一差其第三數乘除得一以減本數阧子三得二與定分子合第四數乘除得三以減本數分子五得二亦為分家子合第五數乘除得二十八以減本數分子得一差減數七以較定
