body:
  text: 錢唐項弘達者著錢唐戴照校整分起度弦矢率論弦矢為割圓要事而求之實難古用勾股分四邊六邊起算以及西人之六宗三要等要皆析圓分以遞求而限於一隅度難任設其取途尚局施算較繁數則得矣而通方徹圓之率終未能抉其原也積思累年乃始知剖圓周界迮線自有天然之象數應乎其間象者何兩等邊三角形是此形為逐分之通弦半徑相割而成一縱一橫邊角交錯而其式常等若析
