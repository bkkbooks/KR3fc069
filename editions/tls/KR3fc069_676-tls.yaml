body:
  text: 第一術以本乘方積檢開方表其積較本積稍大者用為借積本積共若干位從尾位起依廉率數截而為段以首段積對表檢取其根為借根截積為幾段即知本根有幾位因於借根下亦作圈位補足之若欲增求零數幾位再補幾圈借積內減本積餘為減積以借積除減積得數為遞次乘法乘法由除而得皆在單位下其數不盡視借根連圈共幾即截幾位為乘法又以本乘方乘數加一為廉率迺置借根為第一數次置第一數乘法乘之乘法乘位下於單一共幾位亦於乘得數自乘位起截去幾位以暗藏單一之得故也今乘借根有圈位視圈有幾則少截幾位廉率除之為第二數除出數亦不盡除至實末位止其下一位除後滿五進為一不滿五棄其零次置第二數乘法乘
