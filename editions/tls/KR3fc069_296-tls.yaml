body:
  text: 法命之得逐行積是為三分之二起根遞加數其三分之一起根者準是類推觀圖自悉然此兩圖左右互為正負第一行兩圓所同第二行及負行左右正負互易之亦無弗同既得前圖逐行積即可如法加減而互易之得後圖逐行積也煦案此四乘積用分母增乘以齊其等亦有數取簡易不齊其等者如後五分之幾遞加數是也觀以上推衍三角形以三分之二起度者遞加數即以三分之二起根三角形以三分之一起度者遞加數即以三分之一起根其負形腰率即負行數第一
