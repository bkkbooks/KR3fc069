body:
  text: 此所謂律數皆連入例也記營比音而樂之律之音必相比而後諸律之數亦必相比而後合今考其數黃鐘比大呂若大呂與太簇亦若太簇與夾鐘凡相距一位者皆成比例黃鐘比太簇若太簇與姑洗亦
