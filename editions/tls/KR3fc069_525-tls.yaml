body:
  text: 錢唐項名達著錢唐戴煦校補諸術通詮上四卷發明整分半分零分起度弦矢率而會歸於遞加數末雖斟定各數算術係為術推原非就術詮解也且弦矢率與遞加數相應者乃其用數而諸率自有其本數求弦矢須遞增本數之乘除而術始備新立此弧弦矢求他弧弦矢二術其義蘊實包攬無遺一切術皆自此而生而各據其一得今按術詮解二術顯一切術自明故半徑求弦矢二術及董氏杜
