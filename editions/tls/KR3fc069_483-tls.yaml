body:
  text: 則逐層分母不同亦須通分故視本層較上層增寄幾乘則以幾乘通左上位加本位得左位積以幾乘通右上位減本位得右位積其求法或一以左線所聯之左位乘本位一以右線所聯之右位乘本位而先得奇耦二行直下積或概以左線所聯之左位乘本位而先得各首積然後順加逆減以求各層積均無不可凡求逐位積皆須用分母除故每層寄分必增寄一乘此寄分之有定者而每層遞加數之除法如與分母相涉則亦不受除何謂相涉但凡除法與
