body:
  text: 整分起度一半分起度一零分起度皆以兩等邊三角明其象遞加法定其數末乃申論其算法整分半分者均已告成零分者算法未釋尚擬將扭定四術及董氏杜氏諸術別為一冊詳解之但現在病體頗頓精力日衰弦矢術或勉力成之橢圓則不能善解矣此道無人能助可為將伯之呼者惟有閣下將來稍有頭緒謹當呈政尚乞代為整理之是所感禱
