body:
  text: 兩儀陽一陰一第三層為四象太陽一太陰一少陽少陰共二第四層為八卦乾一坤一震坎艮一陽二陰卦三巽離兌一陰二陽卦三第五層為四畫卦純陽一純陰一一陽三陰卦四一陰三陽卦四二陽二陰卦六以下多畫卦本此可推又如萬象不外乎點線面體左線第二行一二三四等數為點數一點為點二點成線三點成面四點成體四以下為多乘體點數第三行一三六十等為線數一線為線三線成面六線成體六以下為多乘體線數第四行一四十二十等為面數一面為面四面成體四以下為多乘
