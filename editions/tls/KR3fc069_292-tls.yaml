body:
  text: 得八正分母不受除應增寄一乘又視立積較根增寄三乘今求四乘積較立積祇增二乘應齊其等轉以分母乘之得二十四正為第二行四乘積增寄分為六乘如是遞以正負根乘之遞加數除之同名相乘得積為正異名相乘得積為負奇積列第一行耦積列第二行得兩行積迺求逐行積視平積較根寄分增一乘因以分母三乘次行根得六正以加首行平積一負異名以減為加得五減數大易為正為第三行平積分母乘第四行根得十五正以加三行平積五正得二十正為五行平積分母乘第六行根得
