body:
  text: 三正分寄六乘書得數五率之位次以得數一率乘法七率得四率二負分寄十乘以得數三率乘法五率應齊其分又以二乘之得四率二負以得數五率乘法三率亦應齊其分以二乘之得四率六負俱分寄十乘書左線左併以減右實無對易為正書右線右法一率除之得數為七率正分寄十乘書得數七率之位如是按位遞乘減實以法一率除得各率所得數即第一形腰率既得第一形腰率考其數即前遞加圖居中第一行機二率乘之率除之得底折半為第二形腰率即前遞加圖第二行積由是挨次乘除加減得各形腰率即前遞加圖遂行積今如法遞求腰底各率列式於左遞求半分起度各形腰底率
