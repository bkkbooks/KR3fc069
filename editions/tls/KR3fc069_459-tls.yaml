body:
  text: 小分幾乘即為本二率分母弧分耦而通弦用二為小分者視弧分為小分幾乘減一乘為本二率分母均以本二率乘數倍之加一為本三率分母而率數亦皆為一用率者以借弧各率求相當之本弧各率為易率之用也前求相當率及乘法僅有借弧二三率與本弧二三率相當之數而奇率不止三如五七九等率皆奇率也易第一形腰率用之耦率不止二如四六八等率皆耦率也易第二形腰率用之求奇率者以相當之本三率借三率兩兩對列然後
