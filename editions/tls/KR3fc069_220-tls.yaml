body:
  text: 倍根加二減二相乘卽倍弧分自乘減四以乘併平積四除之三四遞除之爲併三乘積卽五率倍根加四減四相乘卽倍弧分自乘減十六以乘併三乘積四除之五六遞除之爲併五乘積卽七率倍根加六減六相乘卽倍弧分自乘減三十六以乘併五乘積四除之七八遞除之爲併七乘積卽九率如是遞求得各併積凡定乘法正負及各積正負與併偶行同求倍矢乘法亦與併積相反
