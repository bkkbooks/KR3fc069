body:
  text: 等以期者則同位自然同母若其等未齊須通分相併其法以分母乘數罪多為準其無寄分者以最多乘數乘之其有寄分而較最多乘數差幾乘者則以所差乘數增乘之然後相併仍寄最多乘數為母凡率數相乘三率乘三率即一率乘五率在面積為三率三率乘五率即一率乘七率在面積為四率三率乘七率五率乘五率即一率乘九率在面積為五率三率乘九率五率乘七率即一率乘十一率在面積為六率乘得數後前如按位遞併分置各位其一率乘五率者命為
