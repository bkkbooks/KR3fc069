body:
  text: 是零分亦如是至遞加數乘法正負與弦矢率乘法正負所以不同之故緣求遞加數係以若干分母加減分子而分子為本數故其相加恒為正而相減則分子數大為正分母數大為負求弦矢率係以分子加減若干分母而分母為本數故其相加亦為正而相減則分子數大為負分母數大為正由是兩數相乘在遞加數為同名相乘之正乘法在弦矢率必為異名相乘之負乘法在遞加數為異名相乘之負乘法在弦矢率必為同名相乘之正乘法乘法之正負
