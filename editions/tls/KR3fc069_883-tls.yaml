body:
  text: 十二度正弦乙中後二分為半徑少七十二度正弦乙各三自乘相併得乙乙併各矢三乘幂得二段三十六度正弦三乘幂二段七十二度正弦三乘幂多十二段三十六度正弦平幂乘半徑半幂十二段七十萬度正弦平幂乘半徑平幂五段半徑三乘幂而十二段半徑幂乘兩種正弦幂之共卽十五段半徑三乘幂兩正弦幂相併為一段二分五釐牛徑幂以十二乘之得才五故知十五段半徑三乘幂二段兩種正弦三乘幂為一段八分七釐五毫半徑三乘幂三十六度正弦與七十二度正弦各三自乘相併半徑三乘幂除之得九三七五倍之得一八七五故知為一段八分七釐五毫半徑三乘幂
