  text: 分弧第二形腰心丁土形與心界子形同式心丁火形與心界甲形同式於是比例之求第一形腰術為以心丁比心界若心土與心子而心丁者卽前整分第三形腰心界者即前整分第一形腰緣分母數奇故與整分諸形相當奇數三故用第三形腰為除法兩分子相減得一故用第一形腰為乘法乘除半徑心土而得所求第一形腰
