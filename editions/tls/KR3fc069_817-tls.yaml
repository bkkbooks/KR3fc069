body:
  text: 橢圓象限甲巳為平圓象限心甲心巳皆大半徑心乙為小半徑甲為小徑所指甲丙為所設弧度心丙亦大半徑丙戊為本狐餘弦即庚丙倍弧外通弦兩辛二分之一戊丁為橫截橢圓線心丁為橢圓抵周線成心戊丁丙同股之兩勾股形心丙為大弦心丁為小弦如有心丙求心丁當以心丙為連比例一率以戊丁橫截線與戊丙二分倍弧外通弦之一之兩幂較為二率自乘數一率心丙除之為三率而心甲自乘幂與心甲心乙兩幂較之比同於戊丙自乘幂與戊丙戊丁兩幂較之比凡四率比例其原一二率各自乘之比必同於原三
