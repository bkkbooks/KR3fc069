body:
  text: 十度正弦各再乘相併得又併中一分矢立幂得六段正弦平幂乘半徑多三段半徑立幂而六段正弦半幂乘半徑卽四段五分半徑立幂六十度正弦幂卽七分五釐半徑幂以六乘之得四五故知為四段五分半徑立幂是共得七段五分半徑立幂也弧分三除之又全半比例八除之得二十四分之七五以一五約之仍得十六分之五析象限為四分則中前一分用矢為半徑多二十二度半正弦甲中後一分為半徑少二十二度半正弦甲各再乘相併得甲中前二分用矢為半徑多六十七度半正弦乙中後
