  text: 十五加一差減數得二差加數五十三萬五千三百八十二五以蚾定分子當應減六五而應減數與第二差之比例若六五與一萬六千四百四十五因檢遞加數第二十一行其首位一與五位一萬六百二十六之比例亦若五與五千三百十三次位二十一與六位五萬三千一百三十之比例亦若六五與一萬六千四百四十五試以二十一行自首位起取第十三數以下第二差按位挨次乘之又五位起挨次除之為第三差第十三數乘除得五以減二差加數得三十一萬三千六百十六第十四數乘除得六
