body:
  text: 所得者前一數正者正之負者負之為負乘法所得者前一數正者負之負者正之但有正數併正數卽所求正弦兼有負數併正數與併負數相減卽所求正弦以半徑求逐度正矢法以六十度為分母所求度為分子所求度有零分者以三千六百分為分母化所求度為分納入零分為分子所求度有零秒者以二十一萬六千秒為分母化所求度分為秒納入零秒為分子分子母可約者約之從簡分母自乘與分子自乘相減為第一乘法分母自乘四乘之與分子自乘相減為第二乘法分母自乘九乘之與分子自乘相減為
