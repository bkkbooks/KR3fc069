body:
  text: 正矢求餘切法以正矢減半徑為第一數次以半徑為一率正矢減半徑為二率二率自乘一率除之得三率置第一數以三率乘之一率除之得四率二除之為第二數次置第二數以三率乘之一率除之得六率三乘之四除之為第三數次置第三數以三率乘之一率除之得八率五乘之六除之為第四數次置第四數以三率乘之一率除之得十率七乘之八除之為第五數如是遞乘遞除求至單位下止并諸數即餘切正矢求餘割
