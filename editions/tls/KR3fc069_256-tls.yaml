body:
  text: 心界一率與丁土二率相乘所得實本居一二率之閒法首位一率除之則得數首位為二率然一二率閒作圖不便今將心界借降一率以乘丁土可得二率法亦借降一率其得數必同故法實之首均作圈位下準此法二率除心界丁火兩相乘為實實二率仍心丁為法得二率二得界甲為第二形腰正為得數二率轉乘
