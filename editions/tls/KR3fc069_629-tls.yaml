body:
  text: 倍半徑乘之得一分通弦自乘乘分母自乘之四倍開方得一分通弦乘分母之二倍即通弧也正弦求弧背論曰倍弧背為通弦本弧亦即為正弦本弧今以正弦求弧背是析弧背至極多分使一分通弦與弧合迺以極多之總分倍之取其弧通弦求一分弧通弦極多分乘之得弧背則一分為分子總分之倍為分母亦極分求弦術也以正弦為第一數論曰如析分第一數本宜分母除通弦而半分母
