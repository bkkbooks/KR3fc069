body:
  text: 法第二減差三因倍分加一視為幾取表中第幾行自首位起按位而下即其數為逐數乘法又視倍分日一為幾自第幾位起按位而下即其數為逐數除法以下皆同逐次遞以奇數乘倍分加一取行數乘法皆自首位起除法皆自倍分加一之位起案橢圓弧線無可驗驗之以逐分通弦和今求本數與求橢周同術所異者有加減差耳一象限析分愈多則橢弦漸和弧合加減差愈後而其差亦愈微析至無量分則橢弦和即橢圓象限亦無加減差可言矣
