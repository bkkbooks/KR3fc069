body:
  text: 以借三率乘借三率一率除之得借五率即以本三率乘本三率一率除之得本五率與之相當以借三率乘借五率一率除之德借七率即以本三率乘本五率一率除之得本七率與之相當以借三率乘借七率一率除之得借九率即以本三率乘本七率一率除之德本九率死之相當如事遞乘遞除得各奇率均兩兩對列求耦率者以相當之借二率本二率兩兩對列然後以借三率乘借二率一率除之得借四率即以本三率乘本二率一率除之得本四率與之鄉當以借三率乘借四
