body:
  text: 亦一負正相閒凡根積之負者作斜畫記之今左右方各求至十一行止每行各求至八位止已足知其大槪是爲半分起根遞加圖是圖旣非廉率亦不成三角堆所與相應者惟弦矢率數蓋弦矢率祗是遞加法整分遞加旣與整弧起度之弦矢率應半分遞加亦必與半弧起度之弦矢率應故根差當一率根當二率平積當三率立積當四率奇行積卽各心角形腰率也矢率本之偶行積卽各界角形腰率也弦率本之一切皆與整分遞加數雖與弦矢率相應而正負實不同整分者遞
  hash: sha256:d8242c532c71724faa5328b5f12ed8112cb8421c61dc23b3a6e3aeedc1886e16
