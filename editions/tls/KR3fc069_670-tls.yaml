body:
  text: 正矢減半徑既即餘弦以求諸綫自與正弦等惟互為正餘八術實祗四術也正弦之求正割較正切升一率求餘切較餘弦升一率而其術則等正矢之求餘割正切亦然四術實祗二術也今備列之亦便於取用耳附圓周求徑以周二除之為第一數次置第一數四除之為第二數次置第二數三乘之十六除之為第三數次置第三數三乘之五乘之三十六除之為第四數次置第四數五乘之七乘之六十四除之為第五數次置第
