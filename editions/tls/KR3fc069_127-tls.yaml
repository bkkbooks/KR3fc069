body:
  text: 亦恒除實不盡故所求積愈降寄分亦愈增而多如次根三乘首根一仍得三二除之分母除之均不受除卽以三爲首平積書寄分母再乘於右方首根本寄分母今不受二除分母除故轉以遞乘寄分得分母再乘以三根五乘平積三得十五三除之得五分母除之不受除卽以五爲首立積書寄分母三乘於右方平積本寄分母再乘今又不受分母除故增爲三乘以四根七乘立積五得三十五四除之分母除之均不受除卽以三十五爲首三乘積書寄分母六乘於右方立積本寄分母三乘今又不受四除及分母除故轉以乘寄分增爲六乘以五根九乘三乘積三十五得三百十五五除之得六十三分母
