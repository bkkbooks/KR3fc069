body:
  text: 九數也而應加數與第一差之比例若一與一千八百二十第十數乘除得四千二百八十四以減本數分子一萬二千一百五十五得一差減數七千八百七十一以較定分子應加九而應加數與第一差之比例若九與四千二百八十四因檢遞加數第十三行其首位與五位亦與一與一千八百二十其次位十三與六位六千一百八十八之比例亦若九與四千二百八十四試以第十三行自首位起取第九數以下第一差按位挨次乘之又自五位起挨次除之為第二差第九數乘除得一以加一差減餘數四千
  hash: sha256:71bbcaf10a6e29ff13e557ecc388ab207a990927d9560f9015932d8965eb12b8
