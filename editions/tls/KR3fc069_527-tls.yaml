body:
  text: 氏諸術雖彼此互異幾莫知意指之所存及以二術通之則違者順奧者彰無不宛轉相從而約歸一致河濟江淮皆水也瓶盤釵釧皆金也蓋象與數既得其通而術之各據一得者亦有通詮無異詮矣新立求弦矢四術知本度通弦求他度通弦法以所知度為分母所求度為分子分子母可約者約之從簡論曰所知度卽本度所求度卽他度他度由本度而生故本度為分母他度為分子通弦度在等邊三角形本度卽心角界角度亦卽逐次遞加度他
