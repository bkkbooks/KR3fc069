body:
  text: 蓋仍屬左旋下生半律因加倍故得全律亦真上生也至遞乘除術可以黃鐘左旋下生各律亦可以各律右旋上生黃鐘其上生之法與前術同惟三數後乘法減位數易為加位數得諸數併之減第一數易為加第一數雖一減一加奕猶是一損一益而右旋實大異於左旋所以不立為術者以乘法用加嫌其降位稍難耳而其術固自在也橢圓求周術法以大律為徑求得平圓周為第一數次以橢圓大半徑為第一率小半律自乘大半徑除之轉減大半
