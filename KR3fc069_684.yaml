body:
  text: 以本乘方積檢開方表其積較本積稍小者用為借積其根為借根本積內減借積餘為減積以借積除減積得數為遞次乘法又以本乘方乘數加一為廉率乃置借根為第一數正次置第一數乘法乘之廉率除之為第二數正次置第二數乘法乘之廉率減一乘之二因廉率除之為第三數負次置第三數乘法乘之二因廉率減一乘之三因廉率除之為第四數正次置第四數乘法乘之三因廉率減一乘之四因廉率除之為第五數負如是挨次乘除得數至單位下止併正數與併負數相減得本乘方根
