body:
  text: 錢塘戴煦補橢圓求周圍解凡橢圓與小徑平行橫截之其各線皆與各容平圓之通弦相應又與大徑平行直截之其各線皆與外切平圓之通弦相應黃橫截線引長至外切圓界為外圓若干度通弦則此橫截橢圓線必為內圓若干度通弦又其直截線過內容圓界為內圓若干度通弦則此直截橢圓線必為外圓若干度通弦如圖甲己丙戊為橢圓甲丙為大徑己戊為小徑甲乙丙丁為外切平圓其圓徑甲丙即大徑庚嚫辛戊為內容平圓其圓徑己戊即小徑從圓心作心午心壬心癸三線則外圓午甲壬弧必與內圓辰庚卯弧同度內圓卯巳未弧必與外圓壬乙癸弧同度試作午壬外圓通弦截橢圓界於寅於子而寅子必同辰卯即內圓與午甲壬弧同度之通弦又試作卯未內圓通弦復引長之截橢圓界於子
