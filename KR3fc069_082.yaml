body:
  text: 一層數遞以相連四數相乘二除三除四除之得三乘積一層數如是依次遞乘遞除得多乘各積數每增一數乘即增一數除所得者即增一乘之積然求積必先定根此相連幾數有根在右遞取左位數為乘法而得各積者其積為自根斜左一行線所聯有根在左遞取右位數為乘法而得各積者其積為自根斜右一行線所聯有根在中遞取左右兩位數相乘為乘法而間層得積者其積為自根直下一行線所聯根在右如三角堆求積是法以根加一乘根二除之得平三角堆根加二乘平堆三除之得立三角
