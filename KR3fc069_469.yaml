body:
  text: 蓋耦而折半則奇其通弧倍矢率雖可借整分而求第一二形腰率必參用笨分腰率其求得率必仍用二為分母夫求得率用二為分米而用率用半弧分為分母足分母雜糅不便乘除故須變用弧分為分母也其法視借率寄分米者以二乘之寄分自乘者以二自乘乘之寄分再乘者以二再乘乘之餘仿此分母遂變為弧分而寄分乘數仍照原寄分凡用率之借率首位必令為單一而無寄分其本率不必盡為一故惟分母奇或分母耦而用小分
