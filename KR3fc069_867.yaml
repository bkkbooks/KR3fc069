body:
  text: 用矢為半徑多四十五度正弦再乘得一段正弦立幂多三段正弦半幂乘半徑三段正弦乘半徑平幂一段半徑立幂下可類推中後一分為半徑少四十五段正弦再乘得相併得六段正弦平幂乘半徑兩段半徑立幂而六段正弦平幂乘半徑即三段半徑立幂以正弦幂即半徑幂之半也是共得五段半徑立幂也弧分二除之又全半立幂比例八除之半矢立幂得全矢立幂八分之一得十六分半徑立幂之五析象限為三分則中一分用初即半徑再乘得中前一分用矢為半徑多六十度正弦中後一分為半徑少六
