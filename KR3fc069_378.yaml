body:
  text: 自乘二十五除之在本率應寄自乘而在借率則三率五率皆可除盡七率九率皆可以分母除而但寄分母至十一率始寄自乘以爲用三率亦卽乘法每降二位始增寄一乘依是以求定率則下位之寄分較少惟逐位等差不能盡齊耳易五分之一第二形腰率煦案圖在前頁第二形腰率皆耦檢前整分起度五分通弦爲二率五正四率五負六率一
