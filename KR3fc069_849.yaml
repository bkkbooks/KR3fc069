body:
  text: 第一數泛三率乘通弦和半徑除之二除之又一象限弧分分數除逐分所用半外矢之和乘之半徑除之為第二數泛三率自乘乘通弦和半徑幂除之二除之一乘之四除之又弧分除各半外矢幂和乘之半徑幂除之為第三數泛三率再乘乘通弦和半徑立幂除之二除之一乘之四除之三乘之六除之又弧分除各半外矢立幂和乘之半徑立幂除之為第四數如是各歸本數此求通弦和法也但求一分通弦後一數可就前一數加乘加除而得而求通弦和則不能就前一數加乘加除而得何也逐分半外矢
