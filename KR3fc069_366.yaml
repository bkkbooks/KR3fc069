body:
  text: 形腰為五分之一與四起度者視分母奇其數五即取整分第五形腰率為除法兩分子相減亦得奇其數三即取整分第三形腰率為乘法乘除半徑得第一形腰求第二形腰仍以求第一形之除法為除法又分母奇分子為一者倍得二即取整分第二形腰率分子為四者倍得八即取整分第八形腰率為乘法乘除半徑得第二形腰試圖以明之火土本弧五分為分母界土一分界火四分為分子心甲子即今所求第一形與心火土形同式心甲心子為兩腰界子為一分弧第二形腰界甲即金子為四分弧第二形腰作土界土已以至土木等線即顯圖中各形與整分起度諸三角相當彼之一分敫當今一分故借一分通弦為二率自心土界以至心丁乙皆當彼心角形自土界壬以至土癸木皆當彼界角形乃比例之心丁土形與心丙子形同式以心丁比心丙若心土與心子而心丁者即整分第五形腰心丙者即整分第三形腰故以之乘除心土半徑得心子第
