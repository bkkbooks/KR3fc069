body:
  text: 乘幂之三十五是就本數而論則三十五乘一百二十八除可代用矢三乘幂與半徑三乘幂之乘除就前一數加乘加除求本數則前數已含五乘十六除是加七乘人除五與七疊乘又十六與八疊除即三十五乘一百二十八除可代弧分除半外矢三乘幂之乘半徑三乘幂之除也惟一分弧用矢三乘幂為一百二十八分之八二分弧為一百二十八分之三十四當有加減差由是依法推演則第六數自二分弧以上其弧分除各半外矢四乘幂之和常得二百五十六分半徑四乘幂之六十三就前數求本數則前數已含三十五乘一百
