body:
  text: 二差按位挨次乘之又自三位起挨次除之為第三差第七數乘除得五以減二差加數十六五得十六與定分子合第八數乘除得三五以減二差加數十九五得十六亦與定分子合第九數乘除得一百二十以減二差加數二百四十七得三差減數一百二十七以較定分子一百二十八當應加一是第九數以下當有第四差也而應加數與第三差之比例若一與一百二十第十數乘除得四百八以減二差加數五百二十七得三差減數一百十九以較定分子一百二十八當應加九而應加數與第三差之比
