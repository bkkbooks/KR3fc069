body:
  text: 形以第三形底乙丙加第二形腰界乙甲乙卽界甲得第四形腰界丙為二率二正四率一負加法同名相加今兩二率皆正故相加得二以二率乘之一率除之得底丙丁為三率二正五率一負以第四形底丙丁減第三形腰心丙得第五形腰心丁為一率一正三率三負五率一正減法異名相加無對者原數仍其名減數易其名今心丙為原數丙丁為減數故一率仍為正三率異名相加得三從原數為負五率屬減數易負為正以二率乘之一率除之得底丁戊為二率一正四率三負六率一正以次遞求眾形約法曰以現得界角形底減先得心墮形腰得次後心角形腰乘除而得底以現得心角形底加先得界
