body:
  text: 小半徑幂為一率大小半徑幂較為二率四分倍弧外通弦幂之一為三率求得四率為二率自乘數小半徑除之為連比例三率若依前徑求連比例三率則當以小半徑為一率小半徑除徑幂較為二率即大半徑自乘小半徑除之轉減小半徑四分倍外矢之一為三率求得四率即為求抵周線之連比例三率又若徑用倍外矢為三率則所得之四率亦為求抵周線三率之四倍也凡橢圓外切平圓平分一象限為若干分弧逐分作平橢兩通弦各成同股之兩句股形又從小徑所指
