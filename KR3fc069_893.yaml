body:
  text: 二十八除其求本數祗須加九乘十除三十五與九疊乘一百二十八與十疊除即六十三乘二百五十六除第七數自三分弧以上其弧分除各半外矢五乘幂之和常得一千二十四分半徑五乘幂之二百三十一就前一數求本數則前數已含六十三乘二百五十六除故求本數祗須用十一乘十二除六十三與十一疊乘二百五十六與十二疊除即二百三十一乘一千二十四除總而計之就第一數一乘二除為第二數再加三乘四除為第三數再加五乘六除為第四數再加七乘八除為第五數再加九乘十除為第六數再加十一乘十二除為第七數皆以相連之奇耦二數一
