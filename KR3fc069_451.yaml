body:
  text: 三率之三率必為小分三乘數三率既除為一復以小分再乘除其五率仍寄小分於右以小分自乘除其七率仍寄小分自乘於右以小分除其九率仍寄小分再乘於右十一率仍其原數寄小分三乘於有十三率轉以小分乘之寄小分四乘於右下仿此若小分為分母再乘數則借三率之三率必為分母五乘數亦如上逐率減一乘除之寄分則逐率增一乘餅可類推若通弦分母用借二率數者則借三率之三率為分母自乘三率既除為一復以分母除其五率仍寄分母於右七率仍
