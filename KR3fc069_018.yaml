body:
  text: 整分起度弦矢率論卷二曰半分起度弦矢率論卷三卷四曰零分起度弦矢率論卷五曰諸術通詮卷六曰諸術明變隨將卷三編定選課畢復阻於病今夏始將卷四著有六紙不料病軀重感濕熱兼肝乘脾幾不可救醫治兩月無起色乃又重感燥火致臟腑無不病者遍體血脈不行醫盡束手自佑殘燈微焰斷難久延而是書從此擱筆矣缺而不完世間事大都如是何必戀戀所兼者負緗藝諄囑之心耳然書雖未完而零分各腰率零分遞加數卷三中已衍成其式惟義賾緒繁擬分條詳論於卷四業論至易
