body:
  text: 心子也求第二形腰數為以心丁比丁土若心界與界子以心丁比丁火若心界與界甲皆以心丁為除法與求第一形同而丁土者即前整分第二形腰緣分子一倍得二故用第二形腰為乘法丁火者與土乙土丙皆等即前整分第四形腰緣分子二倍得四故用第四形腰為乘法各乘除半徑心界而得所求第二形腰界子及界甲也比例既明須求率法乘除所用諸形腰皆屬整分整分自一分起故宜借一分通弦為二率則諸形腰率自得以整分之第一形腰一率一正乘半徑一率一正為實第三形腰一率一正三率
