body:
  text: 乘一除蟬聯而下秩然不紊則自第八數以下其遞推之例已顯於前亦必用奇耦二數一乘一除無疑矣然此所求者但可本數也此云本數所以別於加減差即術中先求者與前此之所云本數有別蓋一分弧則第三數以下分數不合二分弧則第五數以下不合三分弧則第七數以下不合又當求其加減差之由來矣欲知加減差之所由來當于半外矢與半徑之比例先求本數之逐數母子然後以一分二分三四分等弧就本數分母各求其逐數分子與本數分子兩相比較於比較而同者知各差之起於何數於比較而
