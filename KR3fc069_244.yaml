body:
  text: 他弧通弦為二率以求之因有借率法求得腰率後廼以借弧之率易為本弧之率因有易率法備論如左借率法分母奇者借一分弧通弦為二率分母偶者借二分弧通弦為二率求第一形腰視分母數奇或偶而折半則奇卽以奇數為形數用前整分諸腰率折半仍偶則以偶數加一為形數用前半分諸腰率為除法以兩分子相減其數奇或偶而折半則奇卽以奇數為形數用前整分諸腰率折半仍偶則以偶數加一
