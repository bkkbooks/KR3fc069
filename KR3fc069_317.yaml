body:
  text: 二分通弦為二率界金二分既為二率則心界金形又與整分第一形相當遷比例之心丁土與心界子同式心丁火與心界甲同式以心丁半分第三形腰比心土半徑若心界整分第一形腰與心子今所求第一形腰以心丁半分第三形腰比心界半徑若丁土半分第二形腰與今所求界子一分弧第二形腰亦若乙土半分第四形腰與今所求金子即界甲三分弧第二形腰觀此比例可悉借率乘除之故矣法一率除實一率得數仍為一率一正次以得數一率乘法三率
