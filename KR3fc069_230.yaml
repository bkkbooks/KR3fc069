body:
  text: 又零分三角第一二形腰溢在圜外旣非半徑通弦復非切割欲求其率井乘除開方亦不能御須用借率易率法求之始得若零分遞加其求積與整分半分者一例簡易不煩宜先以煩且難者證知率數之不誣後乃約從簡易而諸術遂自此立焉分母者所知弧也分子者所求弧也整分半分本有分子母存其間特分母爲一與二可約其定數以立術無庸分別子母今零分任求幾分之幾則全恃子母以爲用子母旣明并整分半分者胥歸一術蓋整與半以導乎其始而零分乃滙乎其全也
