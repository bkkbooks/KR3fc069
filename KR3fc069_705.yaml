body:
  text: 黃鐘相比例求倍正半諸律夫律有十二必先求賓南呂應鐘三者舍此三者別無術可以徑求餘律法尚局而不能通三律遞求而得其尾位數先得者既不能無收棄繼得者必愈有盈虧數亦而不能密或用平方或用立方或用比例殊非一例類又雜而不能齊故取數雖真立術未善因思世子所定律數連比例也能求此連比例者諸乘方也通諸乘方為一例無所謂難與易者遞乘遞除術也展轉研窮審定一術專用黃鐘遍求不必借象於方圜亦不必假途於勾股但本律數十二及所求律距黃鐘之伅
