body:
  text: 得兩數相乘以乘二率二除之三除之得四率此求直行積也系間層越求故須兩乘兩除乘法用根加一得數必移而左又用根減一得數復移而右左右兩抵故得直行積根加二減二得兩數相乘以乘四率四除之五除之得六率根加三減三得兩數相乘以乘六率六除之七除之得八率依次遞求可得各腰率有根當中二數間者如心角形求腰較率是法以中二數相併為倍根根居兩數間宜併兩數折半為根折半則零故不折而用倍倍根數與形數等倍根加一減一得兩數相乘四除之二除之得三率倍根加三減三得兩數相乘以乘三率四除之三除之四除之得五率倍根加五減五得兩數相乘以乘
