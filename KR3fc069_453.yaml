body:
  text: 其原數寄分母自乘於右九率轉以分母乘之寄母再乘於右下仰此以上所用乘法其等已齊求用率時不須通分若通弦分母逐率皆可除盡惟末率寄分母者則借三率之末率以上平分為二其上半各率分母自乘階可除盡下半各率分母皆可除盡但寄分母於右惟末率寄分母自乘於右求用率時當通分也求用率時通分法已見前弧分耦其通弦分母用二為小分者視通弦二率為小分自乘則借三率之三率必為小分三乘數三率既除為一五率仍其原數寄小分三乘於右
