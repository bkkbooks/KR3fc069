body:
  text: 分愈細刖角愈小初分底密切於弦逐分腰皆通於弦矢此天然之象所為底應圓腲應方也數者何遞加數是此數生於一遞加一得諸根而一即根差遞加根得平積而根即平積差遞加平積得立積而平積即立積差如是以至無盡諸差亦無盡方與圓較皆差也此數早揭以相示若析分愈細則差愈多次層根密合於弧逐層積皆通於弦矢此天然之數所為根應圓積應方也象數兩相成而其原得於是弦矢可徑求逐分弦矢可互求弦矢與弧可相求而途之局者通矣止用一二術不煩多術止用乘除加減
