body:
  text: 作左右量線列實於右線右列法於右線左對位書之先以法一率除實一率得數仍為一率一正書左線右一率之位次以得數一率乘法三率得二率一負分寄再乘書左線左以減右實無對易為正書右線右法一率除之得數為三率一正分寄再乘書得數三率之位次以得數一率乘數五率得三率一負分寄六乘以得數三率乘法三率得三率一負分寄五乘較前少寄一乘乃齊其分以分母二成分子一增為三率二負亦寄六乘均書左線左併以減右實無對易為正書右線右法一率除之得數為五率
