body:
  text: 等遞次加大自乘後增為九倍二十五倍四十九倍故分母自乘必逐次增乘也凡本度大於他度者他度為正負兩根相減數本宜併因正負異名故以減為併則分子為較分母為和分母愈加而大不能小於分子其和較不易本度小於他度者他度為兩正根相併數則分子為和分母為較分母漸加而大至大於分子而和較互易總之母和子較者求併積之兩數常一正一負以其異名乘法為負而求率則易為正乘法母較子和者求併積之兩數皆正以其同名乘法為正而求率則易為負乘法與遞
